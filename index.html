<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siti UNESCO Italia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5}
.header{position:fixed;top:0;left:0;right:0;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:20px;z-index:100}
.header-top{display:flex;gap:12px;margin-bottom:16px}
.lang-btn{flex:1;padding:10px;border:2px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-weight:600;transition:all .3s;color:#666;font-size:14px}
.lang-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.site-display{background:#f9f9f9;padding:12px;border-radius:8px;margin-bottom:12px;font-size:15px;color:#333;font-weight:500;min-height:20px}
.site-display .number{color:#667eea;font-weight:700}
.controls{display:flex;gap:10px;margin-bottom:12px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .3s;font-size:14px}
.btn-play{background:#48bb78;color:#fff}
.btn-play:hover:not(:disabled){background:#38a169;transform:translateY(-2px)}
.btn-stop{background:#f56565;color:#fff}
.btn-stop:hover:not(:disabled){background:#e53e3e;transform:translateY(-2px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{position:relative;width:100%;height:10px;background:#e0e0e0;border-radius:5px;cursor:pointer;user-select:none}
.progress-bar{height:100%;background:#667eea;border-radius:5px;width:0%;pointer-events:none}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:#667eea;border-radius:50%;left:0%;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.list-container{margin-top:240px;padding:0 20px 20px}
.site-item{background:#fff;padding:16px;margin-bottom:10px;border-radius:8px;cursor:pointer;transition:all .3s;border-left:4px solid #ddd;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.site-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateX(4px)}
.site-item.active{background:#667eea;color:#fff;border-left-color:#667eea}
.site-number{display:inline-block;background:rgba(102,126,234,.1);padding:2px 8px;border-radius:4px;font-weight:700;margin-right:8px;font-size:12px}
.site-item.active .site-number{background:rgba(255,255,255,.3)}
.site-region{font-size:13px;color:#999;margin-top:4px}
.site-item.active .site-region{color:rgba(255,255,255,.8)}
@media(max-width:480px){
  .header{padding:16px}
  .list-container{margin-top:220px;padding:0 16px 16px}
  .site-item{padding:12px}
  .btn{font-size:13px;padding:10px}
}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <button class="lang-btn active" data-lang="it">🇮🇹 ITA</button>
    <button class="lang-btn" data-lang="en">🇬🇧 ENG</button>
  </div>
  <div class="site-display" id="siteDisplay">Seleziona un sito per iniziare</div>
  <div class="controls">
    <button class="btn btn-play" id="playBtn">▶ PLAY</button>
    <button class="btn btn-stop" id="stopBtn">⏸ PAUSA</button>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-thumb" id="progressThumb"></div>
  </div>
</div>
 
<div class="list-container" id="listContainer"></div>
 
<script>
const sites = [
  {region:"Abruzzo",name:"Alba Fucens Massa d'Albe",city:"L'Aquila",
  it:"Intro - Abruzzo, ai piedi del Monte Velino, in una posizione strategica che permetteva di controllare i collegamenti tra l'Italia centrale e il versante adriatico. Alba Fucens fu fondata come colonia romana nel 303 a.C. e divenne uno dei principali centri di controllo del territorio. Le mura - rappresentano uno degli elementi più imponenti del sito archeologico. Sono costruite con grandi blocchi di pietra accuratamente lavorati e avevano una fondamentale funzione difensiva. Proteggevano la colonia dagli attacchi esterni e permettevano il controllo degli accessi alla città. Abitato - Proseguendo lungo il percorso possiamo osservare i resti dell'abitato. Lungo le strade si sviluppavano le abitazioni e le tabernae, piccoli locali commerciali dove si svolgevano attività di vendita e scambio. Questa era la zona più viva della città, frequentata quotidianamente da cittadini, mercanti e viaggiatori. Via Valeria e il Miliario - Questa importante strada romana collegava Roma al Mar Adriatico e rappresentava una delle principali vie di comunicazione dell'Italia centrale. Lungo il percorso possiamo osservare un miliario che indica la distanza da Roma: 68 miglia. Questi segnali servivano ai viaggiatori per orientarsi e conoscere le distanze lungo il percorso. Il Foro e la Basilica - il Foro era il centro della vita pubblica di Alba Fucens. Qui si svolgevano attività commerciali, amministrative e giudiziarie. Accanto al Foro si trovava la Basilica, edificio destinato agli affari pubblici e all'amministrazione della giustizia. Terme e Santuario di Ercole - Le terme non erano soltanto luoghi dedicati all'igiene personale, ma importanti spazi di incontro e socializzazione. Poco distante si trova il Santuario di Ercole, divinità particolarmente venerata nel mondo romano e considerata protettrice dei pastori e della vita rurale. Anfiteatro - Costruito in età imperiale e parzialmente scavato nel terreno, rappresentava il principale luogo destinato agli spettacoli pubblici. Le sue dimensioni sono circa la metà di quelle del Colosseo. All'ingresso è conservata un'iscrizione che ricorda Quinto Nevio Sutorio Macrone, il personaggio che ne finanziò la costruzione attraverso il proprio testamento. Macrone fu una figura molto influente durante il regno dell'imperatore Tiberio, ma sotto Caligola fu costretto al suicidio. San Pietro in Albe -  nella parte più elevata della città sorgeva il Tempio di Apollo, uno dei principali edifici religiosi della colonia. In epoca medievale, sopra i resti del tempio venne costruita la chiesa di San Pietro in Albe. Da qui possiamo ammirare eil paesaggio che circonda Alba fucens, le montagne e la posizione che ci permette di capire Perché hanno deciso di fondare la città qui.",
  en:"Intro - In Abruzzo, at the foot of Monte Velino, Alba Fucens sits in a strategic position that allowed control over the connections between central Italy and the Adriatic coast. Founded as a Roman colony in 303 BC, it became one of the main centres for territorial control. The Walls - The walls represent one of the most impressive elements of the archaeological site. Built with large, carefully worked stone blocks, they served a fundamental defensive function. They protected the colony from external attacks, and allowed control over access to the city. The Settlement - Continuing along the path, we can observe the remains of the inhabited area. Along the streets, houses and tabernae developed. These were small commercial premises where buying, selling, and trading took place. This was the most lively part of the city, visited daily by citizens, merchants, and travellers. Via Valeria and the Milestone - This important Roman road connected Rome to the Adriatic Sea, and represented one of the main communication routes of central Italy. Along the route, we can observe a milestone indicating the distance from Rome: 68 miles. These markers helped travellers to orientate themselves, and to know the distances along the way. The Forum and the Basilica - The Forum was the centre of public life in Alba Fucens. Here, commercial, administrative, and judicial activities took place. Next to the Forum stood the Basilica, a building dedicated to public affairs and the administration of justice. Baths and Sanctuary of Hercules - The baths were not only places dedicated to personal hygiene, but important spaces for meeting and socialising. Not far away stands the Sanctuary of Hercules, a deity particularly venerated in the Roman world, and considered the protector of shepherds and rural life. Amphitheatre - Built in the imperial age, and partially excavated into the ground, the amphitheatre was the main venue for public spectacles. Its dimensions are approximately half those of the Colosseum. At the entrance, an inscription commemorates Quintus Naevius Sutorius Macro, the figure who funded its construction through his own will. Macro was a very influential figure during the reign of Emperor Tiberius, but under Caligula, he was forced to take his own life. San Pietro in Albe - In the highest part of the city stood the Temple of Apollo, one of the main religious buildings of the colony. In the medieval period, the church of San Pietro in Albe was built over the remains of the temple. From here, we can admire the landscape surrounding Alba Fucens, the mountains, and the position that allows us to understand why they chose to found the city in this very place."},
  {region:"Basilicata",name:"Sassi di Matera",city:"Matera",
  it:"Intro - Ci troviamo nella Basilicata sud-orientale, in un territorio caratterizzato da altopiani calcarei e profonde gravine modellate dall'erosione dell'acqua. Possiamo il sistema dei Sassi (Barisano e Caveoso), che si sviluppa lungo il versante della gravina, e il territorio della Murgia Materana che si estende sul lato opposto. Piazzetta Pascoli - Da questo punto panoramico possiamo osservare l'intero sistema dei Sassi. A est si sviluppa il Sasso Caveoso, la parte più antica dell'insediamento, caratterizzata da abitazioni scavate nella roccia. A ovest si trova il Sasso Barisano, dove gli edifici costruiti in muratura sono più numerosi e testimoniano le trasformazioni avvenute nel corso del tempo. In posizione dominante si distingue la Civita, il nucleo originario e più elevato della città, sormontato dalla Cattedrale di Matera, principale edificio religioso del centro storico. Civita - Osservando la parte più alta della città possiamo riconoscere la Civita. Questo era il nucleo più antico e rappresentava il centro religioso e amministrativo di Matera. Sulla sommità della collina si erge la Cattedrale cattedrale della Madonna della Bruna e di Sant'Eustachio, costruita nel XIII secolo in stile romanico pugliese. La sua posizione dominante le consente ancora oggi di caratterizzare l'intero paesaggio urbano dei Sassi. Abitazioni e Chiese Rupestri - Scendendo lungo il versante possiamo osservare le celebri abitazioni rupestri. Le case sono state scavate direttamente nella roccia e si sviluppano spesso in profondità e su più livelli. In questo complesso sistema abitativo trovavano posto anche numerose chiese rupestri, anch'esse ricavate nella pietra e strettamente legate alla vita religiosa delle comunità locali. I vicinati - Concludiamo la visita osservando come era organizzata la vita quotidiana. Le abitazioni erano raggruppate in piccoli nuclei chiamati vicinati. Questi insiemi di case condividevano spazi comuni come cortili, cisterne e percorsi di collegamento. Grazie a questa organizzazione si sviluppava una forte vita comunitaria, nella quale le famiglie collaboravano nella gestione dell'acqua e delle attività quotidiane. Chiusura -  Prima di terminare la visita, osserviamo il paesaggio circostante. La gravina, i Sassi e l'altopiano della Murgia Materana formano un unico sistema naturale e storico che racconta il rapporto tra l'uomo e l'ambiente nel corso dei millenni. La continuità dell'insediamento umano e l'utilizzo della roccia come risorsa abitativa rappresentano gli elementi che rendono Matera un luogo unico nel panorama europeo.",
  en:"Intro - We find ourselves in south-eastern Basilicata, in a landscape shaped by limestone plateaus and deep ravines, carved over time by the erosion of water. From here, we can take in the Sassi district, made up of the Barisano and Caveoso areas, which unfolds along the slopes of the ravine, and the territory of the Murgia Materana, stretching out on the opposite side. Piazzetta Pascoli - From this panoramic viewpoint, we can observe the entire Sassi system. To the east lies the Sasso Caveoso, the oldest part of the settlement, characterised by dwellings carved directly into the rock. To the west stands the Sasso Barisano, where stone-built structures become more numerous, and bear witness to the transformations that took place over the centuries. In a dominant position, we can distinguish the Civita, the original and highest nucleus of the city, crowned by the Cathedral of Matera, the principal religious building of the historic centre. Civita - Looking up towards the highest part of the city, we can recognise the Civita. This was the most ancient nucleus, and served as the religious and administrative heart of Matera. At the top of the hill rises the Cathedral, dedicated to the Madonna della Bruna and Sant'Eustachio, built in the thirteenth century in the Apulian Romanesque style. Its commanding position allows it, even today, to define the entire urban landscape of the Sassi. Cave Dwellings and Rock-Hewn Churches - Descending along the slope, we can observe the famous cave dwellings. These homes were carved directly into the rock, often extending deep into the hillside, and spreading across multiple levels. Within this complex system of habitation, numerous rock-hewn churches also found their place, likewise cut into the stone, and deeply connected to the religious life of the local communities. The Neighbourhoods - We conclude our visit by observing how daily life was organised. The dwellings were grouped into small clusters known as vicinati, or neighbourhoods. These groups of homes shared common spaces, such as courtyards, cisterns, and connecting pathways. Through this kind of organisation, a strong sense of community developed, in which families worked together to manage water supplies and the tasks of everyday life. Closing - Before we end our visit, let us take a moment to look at the surrounding landscape. The ravine, the Sassi, and the plateau of the Murgia Materana together form a single natural and historical system, one that tells the story of the relationship between human beings and their environment across thousands of years. The continuity of human settlement here, and the use of rock as a living resource, are the very elements that make Matera a truly unique place within the European landscape."},
  {region:"Calabria",name:"Capo Colonna",city:"Crotone",
  it:"Intro - Ci troviamo sulla costa ionica della Calabria, a sud di Crotone. In questo promontorio c’era uno dei più importanti santuari della Magna Grecia, dedicato a Hera Lacinia, una delle principali divinità del mondo greco. Per secoli pellegrini, marinai e viaggiatori raggiunsero questo luogo per rendere omaggio alla dea e chiedere protezione prima di affrontare la navigazione nel Mar Ionio. Il santuario occupava una posizione particolarmente favorevole, protesa sul mare e facilmente riconoscibile da grande distanza. Per i naviganti antichi rappresentava un fondamentale punto di riferimento lungo le rotte commerciali della Magna Grecia. La stretta relazione tra il santuario e il mare contribuì alla fama e all'importanza del luogo. Il Santuario di Hera Lacinia - Entrando nell’area archeologica, ci troviamo davanti ai resti di uno dei più importanti santuari dell'Italia meridionale greca. Qui giungevano fedeli provenienti da numerose città per partecipare alle celebrazioni religiose dedicate a Hera. Il santuario non svolgeva soltanto una funzione religiosa, ma rappresentava anche un luogo di incontro e di scambio tra comunità diverse accomunate dalla cultura greca. La colonna - L'elemento più celebre del sito è la colonna. Si tratta dell'unica colonna superstite del grande tempio. In origine il tempio era circondato da numerose colonne e dominava l'intero paesaggio costiero. Nel corso dei secoli questa colonna è diventata il simbolo stesso di Capo Colonna. Osservando il terreno possiamo riconoscere le fondazioni e la pianta dell'antico edificio. Il tempio fu costruito nel V secolo a.C. e rappresenta uno dei più importanti esempi di architettura religiosa della Magna Grecia. Le sue dimensioni monumentali testimoniano il prestigio raggiunto dal santuario e dalla città di Crotone. Gli edifici - Attorno al santuario erano presenti numerose strutture di servizio. Molti pellegrini percorrevano grandi distanze per raggiungere questo luogo sacro e partecipare alle festività religiose. Per questo motivo furono realizzati edifici destinati all'accoglienza e all'assistenza dei visitatori. Il Bosco Sacro - Le fonti antiche ricordano la presenza di un vasto bosco sacro dedicato a Hera. Gli alberi facevano parte integrante dello spazio religioso e contribuivano a separare simbolicamente l'area del culto dalla vita quotidiana. L'intero paesaggio era quindi concepito come parte del santuario. Area Romana - Con l'arrivo dei Romani il santuario continuò a mantenere la propria importanza. Alcuni edifici furono modificati e adattati alle nuove esigenze, ma il carattere sacro del luogo rimase riconoscibile per molti secoli. La continuità di frequentazione testimonia il profondo valore religioso e simbolico che questo promontorio conservò nel tempo.",
  en:"Intro - We find ourselves on the Ionian coast of Calabria, just south of Crotone. On this promontory stood one of the most important sanctuaries of Magna Graecia, dedicated to Hera Lacinia, one of the principal deities of the Greek world. For centuries, pilgrims, sailors, and travellers made their way to this place to pay homage to the goddess, and to seek her protection before setting out across the Ionian Sea. The sanctuary occupied a particularly favourable position, jutting out over the water and easily visible from a great distance. For ancient navigators, it served as a fundamental landmark along the trade routes of Magna Graecia. This close relationship between the sanctuary and the sea contributed greatly to the fame and importance of the site. The Sanctuary of Hera Lacinia - Entering the archaeological area, we find ourselves before the remains of one of the most important sanctuaries in Greek southern Italy. Worshippers came here from numerous cities to take part in the religious celebrations dedicated to Hera. The sanctuary did not serve a religious function alone, but also acted as a place of meeting and exchange between different communities, united by a shared Greek culture. The Column - The most celebrated element of the site is the column. This is the only surviving column of the great temple. Originally, the temple was surrounded by many columns, and dominated the entire coastal landscape. Over the centuries, this single column has become the very symbol of Capo Colonna itself. Looking at the ground around us, we can make out the foundations and the floor plan of the ancient building. The temple was constructed in the fifth century BC, and stands as one of the most important examples of religious architecture in Magna Graecia. Its monumental dimensions bear witness to the prestige achieved by both the sanctuary and the city of Crotone. The Buildings - Surrounding the sanctuary, a number of service structures once stood. Many pilgrims travelled great distances to reach this sacred place and take part in the religious festivities. For this reason, buildings were constructed to provide hospitality and assistance to visitors. The Sacred Grove - Ancient sources recall the presence of a vast sacred grove dedicated to Hera. The trees formed an integral part of the religious space, and helped to symbolically separate the area of worship from the rhythms of everyday life. The entire landscape, therefore, was conceived as an extension of the sanctuary itself. The Roman Area - With the arrival of the Romans, the sanctuary continued to maintain its importance. Some buildings were modified and adapted to new needs, but the sacred character of the place remained recognisable for many centuries. This continuity of use bears witness to the deep religious and symbolic value that this promontory preserved throughout the ages."},
  {region:"Calabria",name:"Parco archeologico di Scolacium",city:"Borgia",
  it:"Intro -  Ci troviamo sulla costa ionica della Calabria, nel territorio di Roccelletta di Borgia, tra il mare e le colline del Golfo di Squillace. In questo luogo si sono succedute diverse civiltà: l'insediamento greco di Skylletion, la colonia romana di Scolacium e infine il periodo medievale. Grazie alla sua posizione strategica il sito divenne un importante centro di collegamento tra il Mediterraneo orientale e quello occidentale. Basilica di Santa Maria della Roccella - La prima struttura che incontriamo è la Basilica di Santa Maria della Roccella. Questa imponente costruzione in mattoni rossi domina ancora oggi il paesaggio del parco. Edificata tra l'XI e il XII secolo, rappresenta uno dei principali esempi di architettura medievale della Calabria. La presenza di elementi romanici, bizantini e arabi testimonia il ruolo della regione come punto di incontro tra culture differenti. Il Foro romano - Proseguendo raggiungiamo il centro della città romana. Questo era il Foro, la principale piazza pubblica della colonia. Qui si svolgevano attività amministrative, religiose, politiche e commerciali. Particolarmente significativa è la pavimentazione in mattoni disposti a spina di pesce, conservata in modo eccezionale e utile per comprendere l'organizzazione dello spazio urbano. Le strade Romane - Proseguendo il percorso possiamo osservare alcuni tratti delle antiche strade. La città era organizzata secondo una pianificazione regolare basata su assi viari ortogonali. Questo sistema permetteva di collegare in modo efficiente gli edifici pubblici, le abitazioni e le aree dedicate alle attività economiche. Le Terme - Poco più avanti incontriamo i resti delle terme. Le terme costituivano importanti luoghi di socializzazione oltre che di igiene personale. Qui i cittadini trascorrevano parte della giornata, incontravano amici e partecipavano alla vita sociale della comunità. Il Teatro Romano -  Raggiungiamo ora uno dei monumenti più spettacolari del parco. Il teatro sfrutta il naturale pendio della collina e poteva ospitare circa cinquemila spettatori. Sono ancora visibili parte delle gradinate e delle strutture sceniche. Qui si svolgevano rappresentazioni teatrali, spettacoli musicali e celebrazioni pubbliche, mentre la posizione elevata offriva una suggestiva vista sul territorio circostante. Anfiteatro Romano - si tratta dell’unico Anfiteatro romano in Calabria, la costruzione risale all'epoca dell'imperatore Nerva. Unico Anfiteatro noto in Calabria, della cui esistenza si ha notizia sin dalla fine del 1800, ma di cui solo recentemente si sta procedendo ad una significativo scavo della struttura. La datazione oscilla tra I e II sec d.C. e sembra si sia sfruttata lungo il fronte occidentale la depressione naturale della collina su cui in parte la struttura sorge, riprendendo una tipologia diffusa in età tardo repubblicana che utilizzava ai fini realizzativi le condizioni naturali del terreno. Chiusura - Prima di terminare la visita osserviamo il paesaggio che circonda il sito. Gli uliveti che caratterizzano quest'area fanno parte di una tradizione agricola millenaria. La presenza del mare, delle colline e delle terre coltivate aiuta a comprendere perché questo territorio sia stato occupato e valorizzato per oltre duemila anni da popolazioni diverse.",
  en:"--- **Intro** - We find ourselves on the Ionian coast of Calabria, in the territory of Roccelletta di Borgia, between the sea and the hills of the Gulf of Squillace. Over the centuries, several civilisations have succeeded one another in this place: the Greek settlement of Skylletion, the Roman colony of Scolacium, and finally the medieval period. Thanks to its strategic position, the site became an important hub connecting the eastern and western Mediterranean. **The Basilica of Santa Maria della Roccella** - The first structure we encounter is the Basilica of Santa Maria della Roccella. This imposing red-brick building still dominates the landscape of the park today. Built between the eleventh and twelfth centuries, it stands as one of the principal examples of medieval architecture in Calabria. The presence of Romanesque, Byzantine, and Arab elements bears witness to the region's role as a meeting point between different cultures. **The Roman Forum** - Continuing on, we reach the centre of the Roman city. This was the Forum, the main public square of the colony. Here, administrative, religious, political, and commercial activities all took place. Particularly significant is the herringbone brick paving, preserved in an exceptional state of repair, and invaluable for understanding how urban space was organised. **The Roman Streets** - As we continue along the path, we can observe sections of the ancient roads. The city was laid out according to a regular plan, based on a grid of perpendicular axes. This system allowed public buildings, residential areas, and spaces dedicated to economic activity to be connected efficiently throughout the city. **The Baths** - A little further on, we encounter the remains of the baths. The baths served not only as places of personal hygiene, but as important spaces for socialising. Here, citizens would spend part of their day, meeting friends and taking part in the social life of the community. **The Roman Theatre** - We now reach one of the most spectacular monuments in the park. The theatre takes advantage of the natural slope of the hillside, and could hold approximately five thousand spectators. Parts of the seating tiers and stage structures are still visible today. Theatrical performances, musical events, and public celebrations were all held here, while the elevated position offered a striking view over the surrounding territory. **The Roman Amphitheatre** - This is the only Roman amphitheatre in Calabria. Its construction dates back to the reign of Emperor Nerva. Its existence has been known since the late nineteenth century, yet only recently has significant excavation of the structure begun. Its dating ranges between the first and second centuries AD, and it appears that the natural depression of the hillside along the western front was deliberately exploited during construction, following a building typology common in the late Republican period, which made use of the natural conditions of the terrain. **Closing** - Before we end our visit, let us take a moment to look at the landscape surrounding the site. The olive groves that define this area form part of an agricultural tradition stretching back thousands of years. The presence of the sea, the hills, and the cultivated land helps us to understand why this territory has been occupied and valued for over two thousand years, by so many different peoples."},
  {region:"Campania",name:"Reggia di Caserta",city:"Caserta",
  it:"Intro - Ci troviamo in Campania, nel cuore della pianura casertana. La Reggia fu voluta da Carlo di Borbone a partire dal 1752 come nuova residenza della dinastia e come simbolo della potenza del Regno di Napoli. Il progetto venne affidato all'architetto Luigi Vanvitelli, che concepì un complesso monumentale capace di competere con le grandi residenze reali europee come Versailles. Il Palazzo reale - L'edificio colpisce immediatamente lo stile barocco per le sue dimensioni monumentali. Con oltre 1.400 stanze distribuite su cinque piani, rappresenta una delle più grandi residenze reali d'Europa. La costruzione richiese decenni di lavoro sotto la direzione di Luigi Vanvitelli e successivamente del figlio Carlo. Scalone reale - Ci troviamo di fronte allo Scalone Reale, uno dei più importanti della Reggia. È una scala monumentale che collega gli appartamenti inferiori a quelli superiori. Quello che notiamo subito è la statua di un Ercole romano, alta tre metri, che si trova proprio davanti a noi. È una scultura che arrivò qui dalla collezione della famiglia reale. La scala è molto larga. Due leoni in marmo bianco la fiancheggiano ai lati. Quando saliamo, notiamo che la scala si divide in due rampe che salgono simmetricamente. In fondo vediamo tre sculture sulla parete: rappresentano la Maestà Regia e le virtù del sovrano. Se guardiamo verso l'alto, il soffitto è decorato con affreschi che ritraggono il Palazzo di Apollo. Questa scala non era solo per salire. Era pensata per impressionare: quando il Re la percorreva, era uno spettacolo. La musica veniva dai musicisti nascosti dietro le volte. Tutto era studiato per mostrare il potere della mo Cappella Palatina - Proseguendo incontriamo la Cappella Palatina. Questo cappella è stata progettata da Luigi Vanvitelli su richiesta del re Carlo di Borbone. Vanvitelli si ispirò alla cappella di Versailles, e come vediamo è dentro al palazzo. La cappella era destinato alle celebrazioni religiose della famiglia reale.  Due file di colonne alte ci guidano verso l'altare. Il pavimento è in marmi colorati, il soffitto è rivestito d'oro. Sull'altare vediamo l'Immacolata Concezione dipinta da Giuseppe Bonito. È una delle poche opere rimaste dai bombardamenti della Seconda Guerra Mondiale. La Cappella combina lo stile classico con decorazioni barocche molto ricche. Appartamenti reali - Queste sale erano gli ambienti di rappresentanza e di vita della famiglia borbonica. Attraversando le stanze possiamo osservare sale cerimoniali, appartamenti privati, arredi, decorazioni e opere d'arte. Lo stile è un’armoniosa sintesi tra la tradizione barocca e il nuovo gusto classico. Parco Reale - Terminata la visita del palazzo, usciamo verso il Parco Reale. Il parco fa parte integrante del progetto ideato da Luigi Vanvitelli e si sviluppa lungo un asse centrale di circa tre chilometri. Il disegno combina elementi del giardino rinascimentale italiano con modelli francesi ispirati a Versailles. L'acqua costituisce l'elemento principale della composizione e raggiunge il parco grazie all'Acquedotto Carolino. La via d’acqua e le fontane - Osservando il parco possiamo notare il lungo asse prospettico che collega il palazzo alla grande cascata sullo sfondo. Lungo questo percorso possiamo vedere fontane monumentali, vasche, statue e giochi d'acqua che creano un effetto scenografico unico. L'intero sistema era pensato per stupire i visitatori e celebrare il potere della dinastia borbonica. Fontana di Ettore e Atteone - Raggiungiamo il punto più spettacolare del parco. Qui si trova la Fontana di Diana e Atteone, posta ai piedi della grande cascata artificiale. Le sculture rappresentano un episodio della mitologia classica e costituiscono il culmine scenografico dell'intero percorso progettato da Vanvitelli. Giardino Inglese - Poco distante si sviluppa il Giardino Inglese. Realizzato alla fine del XVIII secolo per volontà della regina Maria Carolina, presenta caratteristiche molto diverse rispetto al parco formale. Qui il paesaggio appare più naturale, con laghetti, sentieri sinuosi, piante esotiche e architetture che evocano antiche rovine. Il giardino riflette il gusto romantico diffuso nelle corti europee del periodo. Chiusura - La Reggia di Caserta non è soltanto una residenza reale, ma un grande progetto urbanistico e paesaggistico nel quale architettura, natura e ingegneria si fondono in un unico disegno. Questa visione unitaria rappresenta il principale motivo dell'eccezionale valore storico e artistico del complesso.",
  en:"--- **Intro** - We find ourselves in Campania, in the heart of the Caserta plain. The Royal Palace was commissioned by Charles of Bourbon from 1752 onwards, as the new residence of the dynasty and as a symbol of the power of the Kingdom of Naples. The project was entrusted to the architect Luigi Vanvitelli, who conceived a monumental complex capable of rivalling the great royal residences of Europe, such as Versailles. **The Royal Palace** - The building immediately strikes the eye with its Baroque style and monumental dimensions. With over 1,400 rooms spread across five floors, it stands as one of the largest royal residences in Europe. Its construction required decades of work, first under the direction of Luigi Vanvitelli, and later under his son Carlo. **The Royal Staircase** - We now stand before the Royal Staircase, one of the most impressive features of the Palace. It is a monumental flight of steps connecting the lower apartments to the upper ones. The first thing we notice is a three-metre-tall statue of a Roman Hercules, standing directly before us, a sculpture that arrived here from the royal family's own collection. The staircase is exceptionally wide, and two white marble lions flank it on either side. As we ascend, we notice that it divides into two symmetrical flights, rising in perfect balance. At the far end, three sculptures adorn the wall, representing Royal Majesty and the virtues of the sovereign. Looking upward, the ceiling is decorated with frescoes depicting the Palace of Apollo. This staircase was not simply a means of reaching the upper floors. It was designed to impress. When the King walked through it, it became a spectacle in itself. Musicians, hidden behind the vaulted arches, would fill the space with sound. Every detail was conceived to express the power of the monarchy. **The Palatine Chapel** - Continuing on, we reach the Palatine Chapel. This chapel was designed by Luigi Vanvitelli at the request of King Charles of Bourbon. Vanvitelli drew inspiration from the chapel at Versailles, and as we can see, it is located within the palace itself. The chapel was intended for the religious celebrations of the royal family. Two rows of tall columns guide us towards the altar. The floor is laid in coloured marbles, and the ceiling is gilded throughout. Above the altar we see the Immaculate Conception, painted by Giuseppe Bonito, one of the few works to survive the bombing raids of the Second World War. The Chapel brings together the classical style with richly ornate Baroque decoration. **The Royal Apartments** - These rooms served as both the ceremonial and private living spaces of the Bourbon family. As we pass through the halls, we can observe ceremonial rooms, private quarters, furnishings, decorations, and works of art. The style represents a harmonious blend of the Baroque tradition and the emerging classical taste of the period. **The Royal Park** - Having completed the visit to the palace, we step outside into the Royal Park. The park forms an integral part of the project conceived by Luigi Vanvitelli, and extends along a central axis of approximately three kilometres. Its design combines elements of the Italian Renaissance garden with French influences inspired by Versailles. Water is the primary element of the composition, and reaches the park by way of the Carolino Aqueduct. **The Water Axis and the Fountains** - Looking out across the park, we can take in the long perspective axis that connects the palace to the great cascade in the distance. Along this route, monumental fountains, pools, statues, and water features create a scenographic effect unlike any other. The entire system was conceived to astonish visitors, and to celebrate the power of the Bourbon dynasty. **The Fountain of Diana and Actaeon** - We now reach the most spectacular point of the park. Here stands the Fountain of Diana and Actaeon, set at the foot of the great artificial cascade. The sculptures depict an episode from classical mythology, and form the dramatic centrepiece of the entire route designed by Vanvitelli. **The English Garden** - Not far away lies the English Garden. Created at the end of the eighteenth century at the wish of Queen Maria Carolina, it presents a character very different from the formal park. Here the landscape appears more natural, with small lakes, winding paths, exotic plants, and architectural features evoking ancient ruins. The garden reflects the Romantic sensibility that was widespread among the European courts of the period. **Closing** - The Royal Palace of Caserta is not simply a royal residence, but a great urban and landscape project, in which architecture, nature, and engineering come together as a single unified vision. It is precisely this unity of conception that represents the principal reason for the exceptional historical and artistic value of the complex."},
  {region:"Campania",name:"Parco Nazionale del Cilento",city:"Vallo della Lucania",
  it:"Intro - Ci troviamo in Campania, provincia di Salerno, in un’area protetta molto estesa che copre ambienti costieri, collinari e montani dell’Appennino meridionale. Il parco è Patrimonio Mondiale UNESCO insieme ai siti archeologici di Paestum e Velia e alla Certosa di San Lorenzo a Padula. Il parco è inoltre Riserva della Biosfera e Geoparco. Il nome “Cilento” è generalmente ricondotto al latino cis Alentum, cioè “al di qua del fiume Alento”, in riferimento alla posizione rispetto al corso d’acqua. Cilento: Il Cilento è un paesaggio culturale di straordinario valore con testimonianze di insediamenti fino a 250.000 anni fa. Nei millenni il Cilento è stato ininterrottamente abitato, prima dagli agricoltori del Neolitico e dalle comunità dell’Età del Bronzo e del Ferro, successivamente da Etruschi, colonizzatori greci, Lucani, Romani. Dopo la caduta dell’Impero Romano d’Occidente, il Medio Evo c’è stat la rinascita dei centri abitati e delle vie di comunicazione. Ambiente -  Attraversando il parco possiamo vedere una zona montuosa con vallate in cui scorrono fiumi che scendono nel Mar Tirreno, e il Vallo di Diano, un vasto e fertile altopiano, Notiamo le bellissime grotte che si sono create dalla natura carsica del terreno, sia nell’entroterra che sulla costa. Questa particolare natura geologica delle rocce si chiama «Flysch del Cilento», con le sue forme e colori particolari. La vegetazione è tipicamente mediterranea lungo la costa, con macchia sempreverde, mentre andando nelle aree interne vediamo boschi di leccio e faggio. Tra le specie simbolo si trova la Primula di Palinuro, una pianta che cresce solo in questa zona. Vallo di Diano - scendiamo ora verso il vallo di Diano, siamo in  una vasta conca tra montagne di origine tettonica situata nella parte orientale del parco, al confine con la Basilicata. Si tratta di una pianura interna a circa 450 metri di altitudine, modellata dai fiumi. Il territorio è un importante corridoio naturale che unisce il mar Tirreno alla Basilicata. In questa zona possiamo notare coltivazioni e costruzioni una forte continuità di insediamento umano. Certosa di San Lorenzo a Padula -  è l’elemento centrale del Vallo di Diano. Ci troviamo di fronte al più grande monastero dell'Italia Meridionale. È stato costruito per volontà di Tommaso Sanseverino, vi abitavano i monaci Certosini. Mentre camminiamo, vediamo la corte esterna con il portico dorico, il chiostro della Foresteria con la fontana centrale e la torre dell'orologio. La Chiesa ha una navata unica, decorata con stucchi dorati del Settecento. Vediamo anche la cucina con i suoi enormi tavoli di pietra, la biblioteca che conserva i pavimenti maiolicati, e il refettorio dove mangiavano i monaci. Il chiostro grande è uno dei maggiori d'Europa, al centro possiamo ammirare la bellissima fontana in pietra. Fascia Costiera: Paestum e Velia - Scendendo nella fascia costiera troviamo una grande area storico-archeologica. Paestum, fondata dai Greci con il nome di Poseidonia, è una delle colonie della Magna Grecia meglio conservate. Il Tempio di Hera, detto “Basilica”, è il tempio più antico mentre Il Tempio di Nettuno è il meglio conservato dell’architettura dorica. Il Tempio di Atena, tradizionalmente chiamato “Tempio di Cerere”.. Velia (Elea), fondata dai Focei, è legata alla scuola filosofica eleatica di Parmenide e Zenone. Il sito conserva quartieri urbani, terme romane e il santuario di Asclepio. L’elemento più significativo è la Porta Rosa che oltre a funzionare come passaggio, l’apertura sostiene e contiene le pareti della gola naturale Chiusura - Il Parco Nazionale del Cilento e Vallo di Diano hanno  un grande valore culturale in quanto è stato un crocevia di importanti rotte di commercio e delle vie di comunicazione tra il Mar Tirreno e il Mar Adriatico, ma anche luogo di interazione culturale e politica nella preistoria e nel medioevo. Si tratta di un sistema territoriale continuo in cui natura e storia si sovrappongono senza interruzioni. Dalla costa tirrenica con le città della Magna Grecia, attraverso i monti Alburni, fino alla conca interna del Vallo di Diano, il paesaggio conserva una stratificazione storica e ambientale ancora leggibile. Il riconoscimento UNESCO si basa proprio su questa integrazione tra ecosistemi naturali, insediamenti antichi e tradizioni culturali che hanno modellato il territorio nel lungo periodo.",
  en:"--- **Intro** - We find ourselves in Campania, in the province of Salerno, within a vast protected area covering coastal, hilly, and mountain environments of the southern Apennines. The park is a UNESCO World Heritage Site, together with the archaeological sites of Paestum and Velia, and the Charterhouse of San Lorenzo at Padula. The park is also a Biosphere Reserve and a Geopark. The name Cilento is generally traced back to the Latin expression cis Alentum, meaning on this side of the River Alento, referring to its position in relation to that watercourse. **Cilento** - The Cilento is a cultural landscape of extraordinary value, with evidence of human settlement dating back as far as 250,000 years ago. Over the millennia, the Cilento has been continuously inhabited, first by Neolithic farmers and Bronze and Iron Age communities, and later by Etruscans, Greek colonisers, Lucanians, and Romans. Following the fall of the Western Roman Empire, the Middle Ages brought a revival of settled communities and communication routes throughout the region. **The Environment** - Crossing through the park, we can take in a mountainous zone with valleys through which rivers descend towards the Tyrrhenian Sea, and the Vallo di Diano, a vast and fertile highland plateau. We notice the remarkable caves formed by the karst nature of the terrain, both inland and along the coast. This particular geological character of the rock is known as the Cilento Flysch, distinguished by its distinctive forms and colours. The vegetation is typically Mediterranean along the coast, with evergreen scrubland, while moving into the interior we find forests of holm oak and beech. Among the symbolic species of the area is the Primula di Palinuro, a plant that grows nowhere else in the world. **The Vallo di Diano** - We now descend towards the Vallo di Diano, a vast tectonic basin set among mountains, located in the eastern part of the park, on the border with Basilicata. It is an inland plain lying at approximately 450 metres above sea level, shaped over time by rivers. The territory forms an important natural corridor connecting the Tyrrhenian Sea to Basilicata. In this area, we can observe cultivation, settlements, and a strong continuity of human presence across the ages. **The Charterhouse of San Lorenzo at Padula** - This is the central landmark of the Vallo di Diano. We stand before the largest monastery in southern Italy, built at the wish of Tommaso Sanseverino, and home to the Carthusian monks. As we walk through, we see the outer courtyard with its Doric portico, the Foresteria cloister with its central fountain, and the clock tower. The church has a single nave, richly decorated with gilded stucco work from the eighteenth century. We also pass through the kitchen, with its enormous stone tables, the library, which preserves its original majolica-tiled floors, and the refectory where the monks once took their meals. The great cloister is one of the largest in Europe, and at its centre we can admire a beautiful stone fountain. **The Coastal Strip: Paestum and Velia** - Descending towards the coastal strip, we enter a great historical and archaeological area. Paestum, founded by the Greeks under the name of Poseidonia, is one of the best-preserved colonies of Magna Graecia. The Temple of Hera, known as the Basilica, is the oldest of the three temples, while the Temple of Neptune is the finest surviving example of Doric architecture on the site. The Temple of Athena, traditionally called the Temple of Ceres, completes the group. Velia, ancient Elea, founded by the Phocaeans, is associated with the Eleatic school of philosophy and the thinkers Parmenides and Zeno. The site preserves urban districts, Roman baths, and the sanctuary of Asclepius. Its most significant feature is the Porta Rosa, which not only served as a passageway, but whose arch supports and contains the walls of the natural gorge on either side. **Closing** - The Cilento and Vallo di Diano National Park holds great cultural value as a crossroads of important trade routes and communication paths between the Tyrrhenian and Adriatic Seas, and as a place of cultural and political interaction from prehistory through the Middle Ages. It represents a continuous territorial system in which nature and history are layered one upon the other, without interruption. From the Tyrrhenian coast with its cities of Magna Graecia, across the Alburni mountains, and down into the inland basin of the Vallo di Diano, the landscape preserves a historical and environmental stratification that remains fully legible today. The UNESCO recognition is grounded precisely in this integration of natural ecosystems, ancient settlements, and cultural traditions that have shaped the territory over the long course of time."},
