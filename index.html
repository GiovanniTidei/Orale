  it:"Introduzione Turris Libisonis è l'antica città romana sotto l'attuale Porto Torres. Fu fondata dai Romani vicino alla foce del fiume Mannu, sul Golfo dell'Asinara, forse per volontà di Giulio Cesare o di Augusto. Era un porto importante per i collegamenti tra Roma e il Mediterraneo nord-occidentale. All'inizio del III secolo dopo Cristo, Turris Libisonis era la seconda città della Sardegna per importanza, dopo Caralis (oggi Cagliari): ospitava anche il governatore della provincia per alcuni mesi all'anno. La città iniziò a declinare con la crisi dell'Impero Romano e con l'invasione dei Vandali, nel V secolo. Il parco archeologico di Porto Torres conserva i resti di questa città: edifici pubblici, case private, strade e negozi (tabernae). Visitiamo insieme i monumenti principali. Antiquarium Turritano è il museo del parco. Raccoglie i reperti trovati durante decenni di scavi e comprende anche resti di edifici antichi e strade lastricate e tabernae che sono in parte incorporate proprio nell'edificio dell'Antiquarium stesso. Le abitazioni erano organizzate in isolati (blocchi urbani), non case isolate. Tra gli oggetti più importanti c'è un altare in marmo dedicato alla dea egizia Bubastis: questo altare era legato al culto di Iside, la dea protettrice dei marinai. Si può vedere anche una maschera in marmo che rappresenta un satiro, con corna e orecchie di capra, occhi grandi e sopracciglia marcate: probabilmente decorava una fontana, e dalla bocca usciva l'acqua. Terme Centrali (Palazzo di Re Barbaro) Le Terme Centrali sono le più grandi delle tre terme del parco: oggi restano le mura esterne. Sono conosciute anche come Palazzo di Re Barbaro, dal nome del governatore romano che fece uccidere i santi Gavino, Proto e Gianuario. In realtà erano terme pubbliche, con stanze decorate da mosaici a forme geometriche e colori diversi. Domus di Orfeo Sotto le terme si trovano i resti di antiche ville private, più vecchie delle terme stesse. La Domus di Orfeo conserva pareti decorate e mosaici sul pavimento: la più importante mostra Orfeo che suona la lira. Domus dei Mosaici La Domus dei Mosaici ha una forma particolare, a ventaglio, diversa dalle altre case romane. Domus del Satiro La Domus del Satiro è la casa da cui proviene la maschera marmorea del satiro, oggi esposta nell'Antiquarium. Terme Pallottino Le Terme Pallottino sono più piccole e risalgono alla fine del III secolo dopo Cristo. Ne restano tre stanze. Prendono il nome dall'archeologo che le ha scavate. Peristilio Pallottino Vicino alle Terme Pallottino si trova il Peristilio Pallottino, un portico che portava ai negozi del foro. Oggi restano quattro colonne. Il portico si trova lungo la strada che porta al ponte romano. Ponte Romano sul Mannu Il Ponte Romano è uno dei monumenti più importanti del parco. È lungo 135 metri, con sette arcate, ed è il ponte romano più grande dell'isola. Da duemila anni attraversa ancora il fiume Mannu. Collegava la città con le campagne e le miniere della zona della Nurra. Una curiosità: le arcate diventano più grandi verso ovest, e la strada sale leggermente. Questi due trucchi tecnici permettevano al ponte di superare il dislivello tra le due sponde del fiume. L'acquedotto Romano: L'acquedotto portava l'acqua dalle sorgenti di San Martino fino alla città. Alcuni tratti erano sotto terra, altri sopra terra. Oggi si possono vedere alcuni pezzi dell'acquedotto: il più lungo misura 105 metri. Le Necropoli Le necropoli (le zone con le tombe) si trovavano fuori dalle mura della città, come era normale per i Romani. A ovest si trovano tombe in anfora, tombe alla cappuccina (coperte da tegole a forma di tetto) e tombe a cassone (in pietra). A sud, sotto il centro attuale di Porto Torres, ci sono circa 50 tombe ad arcosolio, oltre a sarcofagi e fosse semplici.",
  en:"Test proof site number 27"},
  {region:"Sicilia",name:"Area Archeologica di Agrigento",city:"Agrigento",
  it:"Capitolo 1: Introduzione La valle dei Templi, è uno tra i siti archeologici più grandi del mondo, siamo sull'acropoli dell'antica Akragas. È uno dei più importanti siti archeologici italiani insieme ai siti di Pompei ed Ercolano. Situata su un altopiano vicino ad Agrigento. La storia della Valle dei Templi è iniziata nel VI secolo a.C. con la fondazione dell'antica colonia di Akragas da parte degli abitanti di Gela e di Rodi. La città raggiunse il suo massimo splendore nel V secolo a.C., diventando una delle colonie greche più importanti della Sicilia, anche grazie al tiranno Terone e alla vittoria sui cartaginesi nella battaglia di Imera nel 480 a.C. Durante questo periodo furono costruiti i templi. Cartagine si prese la sua rivincita nel 406 a.C., conquistando la città di Akragas, che tornò a splendere soltanto due secoli più tardi con la conquista dei romani, che cambiarono il nome in Agrigentum. Non tutto l'enorme impianto urbano è stato riportato alla luce, nascosto sotto i campi e gli uliveti che circondano questa meravigliosa zona. Capitolo 3: Tempio di Giunone Ci troviamo nel punto più alto dello sperone roccioso, a est.  davanti al tempio di Giunone, edificato intorno al 450 a.C. Si conservano 30 colonne alte più di 6 m, 16 delle quali con capitello. Come per la maggior parte dei templi agrigentini non è possibile sapere a quale divinità fosse dedicato. La sua attribuzione a Giunone deriva da un'errata interpretazione di un passo dello scrittore romano Plinio il Vecchio, che si riferisce in realtà ad un altro tempio di Crotone. L'edificio di ordine dorico ha un basamento di quattro gradini su cui poggiano sei colonne sui lati brevi e 13 su quelli lunghi. Al suo interno il tempio è suddiviso in atrio d'ingresso, cella e vano posteriore. A 15 m di distanza dall'ingresso del tempio  si trova l'altare. Probabilmente il tempio fu gravemente danneggiato durante la conquista cartaginese. L'edificio venne poi forse restaurato in epoca romana. Il Tempio della Concordia  è il tempio dorico meglio conservato al mondo insieme al Partenone e si trova lungo la via sacra. Il nome con cui lo conosciamo deriva da un'iscrizione latina ritrovata nelle vicinanze del tempio, ma ad oggi non ci sono certezze sul dio cui fu dedicato. L'ottimo stato di conservazione permette di ammirare 34 colonne insieme al grande frontone e al timpano. Successivamente il tempio si trasformò in chiesa cristiana e questo ha permesso di risparmiare dai saccheggi. Tempio di Asclepio: Lasciamo la collina dei templi e scendiamo nella pianura. Questo santuario si trovava fuori dalle mura della città, in una posizione isolata rispetto agli altri templi che abbiamo visto fino ad ora. Non era un tempio per i cittadini di Akragas, ma un luogo di pellegrinaggio. Le persone arrivavano da lontano, malate o sofferenti, in cerca di guarigione. Il santuario era dedicato ad Asclepio, il dio greco della medicina. Era un complesso grande e organizzato, pensato per accogliere i pellegrini per giorni interi. C'era il tempio vero e proprio, ma anche una fontana e cisterne per l'acqua, indispensabile per i riti di purificazione. C'era l'abaton, l'edificio in cui avvenivano le guarigioni rituali, dove i malati dormivano aspettando un sogno profetico del dio. C'erano sale dove si mangiava insieme e piccole locande dove i pellegrini si fermavano a dormire. Un luogo sacro ma anche molto concreto, quasi un sanatorio antico. Il tempio era piccolo e compatto: una cella centrale preceduta da un atrio con due colonne, raggiungibile da una rampa sul lato est. Le fondazioni sono basse, la pietra è chiara, e tutto intorno si estende la piana aperta, con la collina dei templi sullo sfondo. È un paesaggio molto diverso da quello della Via Sacra: più quieto, più appartato. Si capisce perché i malati venivano fin qui a cercare pace. Capitolo 7: Tempio di Eracle Il tempio di Ercole, Eracle per i greci, è il più antico dei templi dorici di Agrigento ed è stato edificato intorno alla fine del VI secolo a.C. Ora è ridotto in povere. Era un grandissimo tempio, simbolo della potenza e della forza di Eracle, l'eroe nazionale della Sicilia e in particolare di Agrigento. Delle 38 colonne originarie ne restano solamente otto, ricostruite nel XX secolo mettendo insieme elemento per elemento i pezzi originali rinvenuti nell'area. La sua attribuzione all'eroe è ritenuta attendibile sulla base di un passo di Cicerone che ricorda l'esistenza di un tempio dedicato a Ercole presso l'agorà. L'edificio di ordine dorico ha un basamento di tre gradini su cui poggiavano sei colonne sui lati brevi e 15 sui lati lunghi. Al suo interno, il tempio di forma stretta e lunga è suddiviso in atrio d'ingresso, cella e vano posteriore, il primo e l'ultimo con due colonne fra le ante. La porta della cella è fiancheggiata da due piloni, all'interno dei quali una scaletta di servizio conduce al tetto. Si tratta di una caratteristica dell'architettura templare agrigentina presente qui per la prima volta. Ad est del tempio si trovano i resti dell'altare monumentale e ancora più a est i resti di un piccolo tempio arcaico, a cui si riferiscono alcune terrecotte architettoniche. Tempio di Giove Olimpo Le rovine del tempio di Giove, Zeus per i greci, sono la testimonianza di uno dei più grandi templi dorici dell'antichità classica. Purtroppo l'area, probabilmente già danneggiata in passato da terremoti, fu utilizzata come cava sin dal Medioevo. Secondo lo storico Diodoro Siculo, la costruzione del tempio inizia dopo la battaglia di Imera, la grande vittoria delle città greche di Sicilia sui cartaginesi nel 480 a.C. Sempre secondo lo storico, la costruzione del tempio non è mai stata ultimata perché ancora priva di tetto al momento della conquista della città di Akragas da parte dei cartaginesi nel 406 a.C. Il tempio era collocato su di una gigantesca piattaforma rettangolare su cui si ergeva un basamento di cinque gradini, una sorta di podio, che lo isolava dall'ambiente circostante. Il tempio era chiuso da un muraglione di recinzione, con colonne in stile dorico. Tempio dei Dioscuri: Siamo all'estremità occidentale della collina dei templi. Quello che vediamo davanti a noi è uno dei simboli più fotografati di Agrigento, e forse dell'intera Sicilia: quattro colonne doriche ancora in piedi, con in cima un frammento di trabeazione e parte del frontone. Bisogna però sapere una cosa importante. L'aspetto attuale del tempio è frutto di una ricostruzione ottocentesca, eseguita dalla Commissione di antichità della Sicilia, che assembla elementi architettonici di epoche e provenienze diverse. Quello che vediamo non è quindi il monumento originale, ma una ricomposizione. Le quattro colonne sono alte, slanciate, di calcare locale chiaro. Reggono un angolo di architrave e un lembo di frontone triangolare. Il tutto emerge da un basamento di gradini su cui crescono erbe e arbusti. Il nome Dioscuri è solo convenzionale e deriva da un passo del poeta greco Pindaro, che riferisce di un culto in onore di Castore e Polluce ad Akragas. È assai più probabile che il tempio fosse dedicato a Demetra e Persefone, le divinità titolari dell'intera area sacra.",
  en:"Test proof site number 28"},
  {region:"Sicilia",name:"Città tardo barocche della Val di Noto",city:"Noto",
  it:"Introduzione: la Val di Noto L'11 gennaio 1693 (e già il 9 gennaio) un terribile terremoto colpisce la Sicilia orientale, devastando tutta l'area che chiamiamo Val di Noto: comprende le province di Catania, Siracusa e Ragusa, e provoca danni in circa 60 città, grandi e piccole. Da questa tragedia nasce però un vero miracolo artistico: la ricostruzione dà vita a uno straordinario stile tardo barocco, che cambia completamente il volto di città che fino ad allora avevano ancora un aspetto medievale. Protagonisti di questa rinascita non sono solo i grandi architetti, ma anche moltissimi artigiani locali, eredi di un'antica tradizione siciliana di lavorazione della pietra che arriva fin dai cantieri normanni. Le città coinvolte in questa rinascita sono Noto, Modica, Scicli, Ragusa, Caltagirone, Catania perché rappresenta l'apice e la fioritura finale dell'arte barocca in tutta Europa: Il risultato è un unico, grande cantiere del Barocco, capace di mostrare la continuità tra l'epoca prima e dopo il terremoto: In questa visita ci concentriamo su tre di queste città: Noto, Modica e Caltagirone. Noto è il centro più famoso di tutta la zona, e oggi è considerata una delle città più belle ed eleganti d'Europa Dopo il terremoto del 1693, la città non viene ricostruita nello stesso punto: l'antica Noto si trovava sul Monte Alveria, ma la nuova città nasce in un sito completamente diverso, scelto perché più favorevole. A volere questa scelta sono soprattutto la Chiesa e l'aristocrazia dell'epoca, con un disegno urbano completamente nuovo. per questo Noto ha un aspetto così coerente, con strade che si alternano a piazze scenografiche e a grandi scalinate, che collegano terrazze e dislivelli diversi. Per costruire tutto questo viene usata una pietra locale molto morbida, di colore tra il dorato e il rosa, che si presta a essere intagliata in modo molto ricco. Noto è spesso definita la perfetta città barocca: qui il Barocco non è fatto di singoli edifici isolati, ma è un linguaggio che collega tra loro tutta la città - palazzi, chiese, conventi e teatro sembrano un unico grande monumento, costruito con la stessa pietra dorata e nello stesso stile, senza interruzioni. Il monumento simbolo dell'ingresso in città è la Porta Reale, costruita nel 1838 in onore di Ferdinando I di Borbone. Anche se arriva più tardi rispetto al periodo d'oro del Barocco, rappresenta un ingresso ideale in questo universo tardo barocco: una porta che introduce subito il visitatore allo stile della città. la Cattedrale di San Nicolò è la chiesa più importante della città. Possiamo ammirare una facciata imponente di pietra bianca che brilla dall'alto di una maestosa scalinata. La scalinata ha tre rampe ed è stata costruita nel Settecento. La facciata è composta da tre corpi distinti: quello centrale, quello di sinistra con il campanile, e quello di destra con la torre dell'orologio. È in pietra calcarea tenera, uno stile tardo barocco con un tocco di eleganza neoclassica. Avvicinatevi ai portali. Quello centrale è in bronzo: è opera dello scultore Giuseppe Pirrone e racconta alcune scene della vita di San Corrado da Piacenza, il patrono della città. In alto, sopra la facciata, quattro statue dei Quattro Evangelisti, realizzate dallo scultore Giuseppe Orlando Le colonne libere lungo la facciata creano un effetto di movimento e un bel gioco di ombre che è il segno tipico dell'architettura barocca di Noto. Interno: All'interno della chiesa è conservata l’Arca argentea del Cinquecento contenente le spoglie di San Corrado Confalonieri, patrono della città e della diocesi di Noto. Si trova nella cappella in fondo alla navata destra, possiamo solo immaginarla perché è visibile solo in occasione delle festività dedicate al Santo. Ogni dieci anni, l'Arca viene portata a spalla dai fedeli durante la notte fino all'Eremo fuori città, per poi fare ritorno all'alba in cattedrale. Modica: Per scoprire Modica da vicino, percorriamo la Via delle Collegiate: un itinerario che racconta anche la storia di un'antica rivalità che per secoli ha diviso la città, e che oggi si vuole superare. Il percorso unisce tre grandi chiese-monumento, ognuna con uno stile diverso - dal Rinascimento al Gotico, dal Barocco al Neoclassico. La prima tappa è il Duomo di San Giorgio, Salire la scalinata è un'esperienza tipicamente barocca: si cammina tra vicoli, stradine e palazzi anche imponenti, e all'improvviso vediamo la bellezza della facciata. La facciata è divisa in tre ordini sovrapposti che salgono sempre più stretti verso l'alto, fino a terminare con una cuspide a punta. Questa verticalità è uno dei tratti più tipici del Barocco. Guardate le colonne: non sono addossate alla parete come pilastri piatti, ma sono libere, cioè staccate dalla facciata e ruotate leggermente verso l'esterno. Questa scelta crea un effetto di movimento, come se la pietra stesse per muoversi, e disegna ombre profonde che cambiano con la luce del sole. È la firma del Barocco: la pietra come materia viva, non statica. Interno: entrando possiamo ammirare la Madonna della Neve e il grande polittico di Bernardino Niger. San Giorgio è il patrono della parte alta di Modica, e nel giorno della sua festa la statua viene portata in processione per le stradine della città. La seconda tappa è la Collegiata di San Pietro, cuore religioso della parte bassa di Modica. Anche qui possiamo ammirare la scalinata: ai lati, su piedistalli di pietra, stanno dodici grandi statue degli Apostoli. I modicani le chiamano affettuosamente i Santoni. Sono realizzate in pietra locale, tutte diverse, e accompagnano la salita come una folla silenziosa di guardiani. Facciata: La facciata rispetto a San Giorgio è più sobria, più piatta, meno travolgente. Invece delle colonne libere del Barocco, qui si usano le lesene: fasce verticali decorate che scandiscono la parete. In cima alla facciata, sull'apice, c'è una scultura di Gesù Cristo in trionfo. Curiosità: Tra la parte alta e quella bassa della città esisteva un confine storico, chiamato il Limite delle Matrici: divideva i fedeli di San Giorgio (i sangiorgiari) da quelli di San Pietro (i sampietrani) La terza e ultima tappa della Via delle Collegiate è la Collegiata di Santa Maria di Betlem. Facciata: Questa è la chiesa più antica delle tre e la più diversa: non è Barocca. È una facciata a due tempi e due stili, e si capisce guardandola con attenzione. Il primo ordine — la parte bassa della facciata — è Rinascimentale: è l'unica facciata rinascimentale sopravvissuta al terremoto del 1693. Le forme sono più regolari, simmetriche, ordinate. Niente colonne libere o slanci verticali: qui la pietra sta ferma, composta, misurata. Il Rinascimento cerca l'armonia e la proporzione, non il movimento e la meraviglia del barocco. Il secondo ordine — la parte alta — fu completato nel 1800 in stile Neoclassico: linee più pulite ancora, senza ornamenti barocchi, con un senso di razionalità e compostezza tipica del gusto dell'Ottocento. Sul fianco sinistro della chiesa, cercate una lunetta in pietra calcarea incassata nella parete: è la Lunetta di Berlon, un bassorilievo che rappresenta una Natività. Apparteneva a una delle piccole chiese che esistevano qui prima. In basso si vede ancora un'iscrizione in caratteri gotici. È un frammento antico, quasi nascosto, che racconta secoli di storia in pochi centimetri di pietra. Interno: Tra i suoi tesori più preziosi c'è la Cappella Palatina, chiamata anche Cappella Cabrera, in fondo alla navata destra: custodisce il simulacro della Madonna di Betlemme. Da questa chiesa parte anche uno dei momenti più emozionanti della Pasqua modicana, la festa della Madonna Vasa Vasa: la statua della Madonna, vestita a lutto, cerca il figlio risorto e, non appena lo trova, inizia a battere le mani, per poi abbracciarlo e baciarlo sul costato. Caltagirone: Il monumento simbolo è la Scalinata di Santa Maria del Monte, costruita per collegare la parte antica della città, in basso, con la nuova città costruita più in alto. È lunga oltre 130 metri, fiancheggiata da palazzi con balconi, ed è oggi l'emblema della città. Ogni scalino è decorato sul fronte con piastrelle di ceramica policroma con disegni, floreali o geometrici che raccontano - scalino dopo scalino - la storia dell'arte siciliana: stile arabo, normanno, svevo, angioino-aragonese, chiaramontano, spagnolo, rinascimentale, barocco, settecentesco, ottocentesco e contemporaneo. Curiosità: Ogni anno, per la festa di San Giacomo (patrono della città), la scalinata viene illuminata da migliaia di piccole lampade a fiamma viva, chiamate lumera: Per l'occasione si spegne ogni luce elettrica, e l'effetto è quello di una vera colata di fuoco che disegna eleganti figure decorative lungo tutta la scala. In primavera, tra maggio e giugno, la scalinata si trasforma ancora: migliaia di piccole piante in vaso vengono disposte sui gradini per comporre disegni floreali. Un'opera simile a questa scalinata, la Scalinata Selarón, è stata costruita a Rio de Janeiro",
  en:"Test proof site number 29"},
  {region:"Sicilia",name:"Monte Etna",city:"Catania",
  it:"Introduzione: Siamo a Nicolosi, sul versante sud dell'Etna, a circa 700 metri di quota. Questa città viene anche detta: la porta dell’Etna. La visita dura circa 2 ore e si svolge interamente qui: faremo una passeggiata nel paese e visiteremo il Museo Vulcanologico dell'Etna. L'Etna è il vulcano attivo più alto d'Europa, ed è in attività quasi continua da centinaia di migliaia di anni. Le eruzioni più importanti in tempi storici sono quella del 1669, partita proprio dai fianchi sopra Nicolosi e arrivata fino al mare dopo aver distrutto undici paesi, e quella del 2001 e 2003, che minacciarono i paesi vicini. L'Etna non è mai stato solo una minaccia: la sua lava ha fertilizzato i terreni rendendoli tra i più ricchi di Sicilia, la sua pietra ha costruito chiese, palazzi e strade, il suo paesaggio ha plasmato l'identità delle popolazioni che vivono ai suoi piedi. Nicolosi — il paese: Se guardiamo gli edifici intorno a noi, notiamo il colore: grigio scuro, quasi nero. Tutto è costruito in pietra lavica, il materiale da costruzione che gli abitanti hanno sempre avuto a disposizione. Il paese fu in parte sepolto dalla lava dell'eruzione del 1669, eppure gli abitanti ricostruirono le case nello stesso identico luogo, usando come materiale da costruzione proprio quella roccia che aveva cancellato la città. Una storia di adattamento. Museo Vulcanologico — esterno: Questa casa ottocentesca in pietra lavica è la casa appartenuta ai fratelli Gemmellaro, e in particolare a Mario Gemmellaro, vulcanologo di fama europea. Gemmellaro dimostrò che l'Etna non è un vulcano unico ma un agglomerato di piccoli vulcani sovrapposti. Il museo è nato qui proprio qui, in questa casa. Prima sala — Centro Documentazione: Entriamo nella prima sezione, La parete di fronte a noi è dominata da un video-wall: uno schermo enorme che mostra in diretta le immagini provenienti dal vulcano e dalla sede operativa dell'INGV, l'Istituto Nazionale di Geofisica e Vulcanologia. In questo momento, in tempo reale, possiamo vedere cosa sta facendo l'Etna. Alle pareti, una collezione di fotografie e gigantografie descrive le diverse fasi evolutive delle eruzioni più significative. Fontane di lava, colate notturne, nuvole di cenere su Catania. Al centro della sala si trova il plastico in scala dell'intero territorio etneo: da qui si capisce la forma vera del vulcano, i quattro crateri sommitali, i fianchi con i coni secondari, i paesi tutt'intorno. Seconda sala — il casale ottocentesco: Entriamo nel casale in pietra lavica dell'Ottocento, la zona più antica del museo. Qui sono esposti campioni di prodotti lavici e pannelli didattici che illustrano la nascita e l'evoluzione dei vulcani e il rapporto tra l'Etna e le popolazioni che vivono ai suoi fianchi. Nelle vetrine si trovano le forme che la lava assume raffreddandosi: cristalli di ematite e di zolfo, scorie, silicati e bombe vulcaniche. Le bombe sono frammenti di magma espulso in aria durante le eruzioni esplosive: si solidificano in volo e assumono forme arrotondate o a spirale. Le scorie sono invece materiale poroso e leggero, pieno di bolle d'aria rimaste intrappolate nel raffreddamento rapido. Biblioteca e uscita: Prima di uscire, in un angolo tranquillo della struttura si trova la biblioteca del museo: una raccolta di testi tecnici e divulgativi sull'Etna e sul suo territorio, a disposizione di chi vuole approfondire. Accanto, il bookshop permette di portare a casa qualcosa di concreto: guide, stampe, campioni di roccia.",
  en:"Test proof site number 30"},
  {region:"Sicilia",name:"Palermo arabo-normanna",city:"Palermo",

// ─── State ────────────────────────────────────────────────────────────────────
let lang = 'it';
let selectedIdx = -1;
let isPlaying = false;
let utterance = null;
 
// Time-based tracking (works on mobile where onboundary is absent)
let playStartTime = 0;       // Date.now() when current segment started
let playOffset = 0;          // absolute char index where current segment started
let pauseCharIdx = 0;        // absolute char index saved at pause — used for resume
let animFrame = null;        // rAF handle
let chunks = [];
let currentChunkIdx = 0;

// ─── Keep-alive: loop silenzioso per impedire sospensione su Android ───────
let _kaCtx = null;

function startKeepAlive() {
  if (_kaCtx) return;
  _kaCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = _kaCtx.createBuffer(1, _kaCtx.sampleRate * 0.5, _kaCtx.sampleRate);
  (function loop() {
    if (!_kaCtx) return;
    const src = _kaCtx.createBufferSource();
    src.buffer = buf;
    src.connect(_kaCtx.destination);
    src.onended = loop;
    src.start();
  })();
}

function stopKeepAlive() {
  if (_kaCtx) { _kaCtx.close(); _kaCtx = null; }
}
 
// ─── Chars-per-second estimate ────────────────────────────────────────────────
// Default speech is ~150 wpm. Italian avg word ~5.5 chars + 1 space = ~6.5 chars.
// 150 wpm × 6.5 / 60 s ≈ 16 chars/s at rate 1.0
// We scale by the utterance rate.
function getCharsPerSecond() {
  const rate = (lang === 'it') ? 1.0 : 0.9;
  return 16 * rate;
}
 
// ─── DOM ──────────────────────────────────────────────────────────────────────
const playBtn      = document.getElementById('playBtn');
const stopBtn      = document.getElementById('stopBtn');
const siteDisplay  = document.getElementById('siteDisplay');
const listContainer= document.getElementById('listContainer');
const progressBar  = document.getElementById('progressBar');
const progressThumb= document.getElementById('progressThumb');
const progressWrap = document.getElementById('progressWrap');
 
// ─── Build list ───────────────────────────────────────────────────────────────
sites.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'site-item';
  el.dataset.index = i;
  el.innerHTML = `<span class="site-number">${i+1}</span><strong>${s.name}</strong><div class="site-region">${i+1}. ${s.region} • ${s.city}</div>`;
  el.addEventListener('click', () => selectSite(i));
  listContainer.appendChild(el);
});
 
// ─── Language buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  lang = btn.dataset.lang;
  stopAndReset();
}));
 
// ─── Helpers ──────────────────────────────────────────────────────────────────
function getText() {
  if (selectedIdx < 0) return '';
  return lang === 'it' ? sites[selectedIdx].it : sites[selectedIdx].en;
}
 
function setProgress(pct) {
  pct = Math.max(0, Math.min(100, pct));
  progressBar.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
}
 
// Snap charIdx back to the start of the current word (avoid mid-word start)
function snapToWord(text, charIdx) {
  if (charIdx <= 0) return 0;
  let i = charIdx;
  while (i > 0 && !/\s/.test(text[i - 1])) i--;
  return i;
}
 
// ─── rAF-based progress animation ─────────────────────────────────────────────
function startAnimation() {
  stopAnimation();
  function tick() {
    if (!isPlaying) return;
    const fullText = getText();
    if (!fullText) return;
    const elapsed = (Date.now() - playStartTime) / 1000;
    const estimatedAbs = playOffset + elapsed * getCharsPerSecond();
    const clampedAbs = Math.min(estimatedAbs, fullText.length);
    pauseCharIdx = Math.floor(clampedAbs);          // keep updated every frame
    setProgress((clampedAbs / fullText.length) * 100);
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}
 
function stopAnimation() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}
 
// ─── Cancel speech + animation ────────────────────────────────────────────────
function cancelSpeech() {
  speechSynthesis.cancel();
  stopAnimation();
  stopKeepAlive();
  isPlaying = false;
  playBtn.disabled = false;
  chunks = [];
}
 
function stopAndReset() {
  cancelSpeech();
  playOffset   = 0;
  pauseCharIdx = 0;
  setProgress(0);
}
 
// ─── Select site ──────────────────────────────────────────────────────────────
function selectSite(idx) {
  if (idx !== selectedIdx) stopAndReset();
  selectedIdx = idx;
  document.querySelectorAll('.site-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-index="${idx}"]`).classList.add('active');
  siteDisplay.innerHTML = `<span class="number">${idx+1}.</span> ${sites[idx].name}`;
}
 
// Divide il testo in pezzi da max ~2500 caratteri, tagliando sui punti/punto e virgola
function splitIntoChunks(text, maxLen) {
  const result = [];
  let start = 0;
  while (start < text.length) {
    let end = Math.min(start + maxLen, text.length);
    if (end < text.length) {
      // cerca l'ultimo punto/newline prima di end
      let cut = -1;
      for (let i = end; i > start + maxLen * 0.5; i--) {
        if ('.!?\n'.includes(text[i])) { cut = i + 1; break; }
      }
      if (cut > start) end = cut;
    }
    result.push({ start, end, text: text.slice(start, end) });
    start = end;
  }
  return result;
}

// ─── Core: speak from absolute char index ─────────────────────────────────────
function speakFrom(charIdx) {
  cancelSpeech();
  startKeepAlive();
  const fullText = getText();
  if (!fullText) return;

  const snapped = snapToWord(fullText, charIdx);
  pauseCharIdx = snapped;

  // Costruisci i chunk dall'inizio
  const allChunks = splitIntoChunks(fullText, 2500);

  // Trova il chunk da cui partire (quello che contiene snapped)
  let startChunk = 0;
  for (let i = 0; i < allChunks.length; i++) {
    if (allChunks[i].end > snapped) { startChunk = i; break; }
  }

  chunks = allChunks;
  currentChunkIdx = startChunk;

  // Il primo chunk potrebbe dover partire a metà
  const firstChunkStart = snapped - allChunks[startChunk].start;
  playOffset = snapped;
  playStartTime = Date.now();

  function speakChunk(chunkIdx, offsetInChunk) {
    if (chunkIdx >= chunks.length) {
      // Fine testo
      stopAnimation();
      stopKeepAlive();
      isPlaying = false;
      playBtn.disabled = false;
      setProgress(100);
      playOffset   = 0;
      pauseCharIdx = 0;
      return;
    }

    const chunk = chunks[chunkIdx];
    const textToSpeak = chunk.text.substring(offsetInChunk || 0);

    utterance = new SpeechSynthesisUtterance(textToSpeak);
    utterance.lang = (lang === 'it') ? 'it-IT' : 'en-US';
    utterance.rate = (lang === 'it') ? 1.0 : 0.9;

    utterance.onboundary = (e) => {
      if (e.name !== 'word') return;
      playStartTime = Date.now() - (e.charIndex / getCharsPerSecond()) * 1000;
    };

    utterance.onstart = () => {
      isPlaying = true;
      playBtn.disabled = true;
      playStartTime = Date.now();
      // playOffset è già impostato correttamente prima di chiamare speakChunk
      startAnimation();
    };

    utterance.onend = () => {
      stopAnimation();
      if (!isPlaying) return; // pausa/stop manuale
      currentChunkIdx = chunkIdx + 1;
      if (chunkIdx >= chunks.length - 1) {
        stopKeepAlive();
      }
      playOffset = chunks[chunkIdx].end;
      pauseCharIdx = playOffset;
      playStartTime = Date.now();
      speakChunk(currentChunkIdx, 0);
    };


    utterance.onerror = (e) => {
      if (e.error === 'interrupted') return;
      stopAnimation();
      isPlaying = false;
      playBtn.disabled = false;
    };

    speechSynthesis.speak(utterance);
  }

  isPlaying = true;
  playBtn.disabled = true;
  speakChunk(startChunk, firstChunkStart > 0 ? firstChunkStart : 0);
}
 
// ─── Play button ──────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (selectedIdx < 0 || isPlaying) return;
  // Resume from where we paused (pauseCharIdx updated every rAF frame while playing)
  speakFrom(pauseCharIdx);
});
 
// ─── Pause button ─────────────────────────────────────────────────────────────
stopBtn.addEventListener('click', () => {
  if (!isPlaying) return;
  // pauseCharIdx is already up-to-date from the last rAF tick
  const savedChar = pauseCharIdx;
  const savedPct  = parseFloat(progressBar.style.width) || 0;
  cancelSpeech();
  pauseCharIdx = savedChar;   // restore after cancelSpeech (which doesn't touch it)
  setProgress(savedPct);
});
 
// ─── Progress bar: seek by click or drag ──────────────────────────────────────
function seekTo(e) {
  if (selectedIdx < 0) return;
  const rect = progressWrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const fullText = getText();
  if (!fullText) return;
  pauseCharIdx = Math.floor(pct * fullText.length);
  setProgress(pct * 100);
  speakFrom(pauseCharIdx);
}
 
let dragging = false;
progressWrap.addEventListener('mousedown',  e => { dragging = true; seekTo(e); });
document.addEventListener('mousemove',      e => { if (dragging) seekTo(e); });
document.addEventListener('mouseup',        ()=> { dragging = false; });
progressWrap.addEventListener('touchstart', e => { dragging = true; seekTo(e); }, {passive:true});
document.addEventListener('touchmove',      e => { if (dragging) seekTo(e); }, {passive:true});
document.addEventListener('touchend',       ()=> { dragging = false; });
</script>
