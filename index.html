  {region:"Emilia-Romagna",name:"I Portici di Bologna",city:"Bologna",
  it:"Intro - Ci troviamo a Bologna, una città unica in Italia per una caratteristica particolare: i portici. Questi non sono semplici decorazioni architettoniche, ma parte dell'identità stessa della città. I portici di Bologna si sviluppano per circa 62 chilometri e risalgono dal XII secolo fino ai nostri giorni. Questo sito, riconosciuto Patrimonio dell'Umanità dall'Unesco, comprende dodici componenti significative che rappresentano l'evoluzione di questa tipologia architettonica nel tempo. I portici - sono strutture coperte che fiancheggiano le strade e le piazze. Servono come passaggi pedonali protetti e spazi dove fare commercio. Alcuni corrono su un solo lato della strada, altri su entrambi i lati. Non formano sempre un percorso continuo, ma creano comunque un'esperienza urbana coerente e riconoscibile. Materiali - Osservando i portici, notiamo come siano stati costruiti con materiali diversi secondo le epoche. I più antichi sono in legno o in pietra. Nel Medioevo e nel Rinascimento prevalgono i mattoni. Nel Novecento il cemento armato ha permesso nuove forme costruttive e un linguaggio architettonico moderno, come vediamo nel quartiere Barca. Funzioni  I portici hanno sempre avuto molteplici funzioni. Proteggono i pedoni dalle intemperie, creano spazi per il commercio e l'incontro sociale. Sono proprietà private, ma sono usati dal pubblico: questo li rende unici, espressione vera della vita cittadina. Evoluzione -  attraverso i secoli fino ad oggi, i portici non sono mai stati abbandonati. La città si è espansa e trasformata, ma loro si sono adattati, mantenendo la loro funzione e identità. Rappresentano diversi stili, diverse classi sociali: dalle abitazioni operaie alle residenze aristocratiche, dalle chiese alle fabbriche pubbliche. Chiusura - I portici di Bologna non sono solo architettura. Sono il modo in cui la città vive, si muove, commercia. Sono la memoria di Bologna e il suo presente insieme.",
  en:"--- **Intro** - We find ourselves in Bologna, a city unique in Italy for one very particular feature: its porticoes. These are not simply architectural decorations, but part of the very identity of the city itself. The porticoes of Bologna extend for approximately 62 kilometres, and date from the twelfth century right up to the present day. This site, recognised as a UNESCO World Heritage landmark, encompasses twelve significant components that represent the evolution of this architectural tradition over time. **The Porticoes** - The porticoes are covered structures that line the streets and squares of the city. They serve as sheltered pedestrian passages, and as spaces for trade and commerce. Some run along just one side of the street, others along both. They do not always form a continuous route, yet they create an urban experience that is coherent and immediately recognisable. **Materials** - As we observe the porticoes, we notice that they have been built with different materials according to the period in which they were constructed. The oldest are in wood or stone. During the Middle Ages and the Renaissance, brick becomes the dominant material. In the twentieth century, reinforced concrete allowed for new structural forms and a modern architectural language, as we can see in the Barca district. **Functions** - The porticoes have always served multiple purposes. They protect pedestrians from the weather, and create spaces for commerce and social encounter. They are privately owned, yet open to the public, and it is precisely this quality that makes them unique, a true expression of urban life. **Evolution** - Across the centuries and up to the present day, the porticoes have never been abandoned. The city has expanded and transformed around them, but they have adapted in turn, preserving their function and their identity. They reflect different styles and different social classes, from workers' housing to aristocratic residences, from churches to public buildings. **Closing** - The porticoes of Bologna are not simply architecture. They are the way in which the city lives, moves, and trades. They are, at once, the memory of Bologna, and its living present."},
  {region:"Emilia-Romagna",name:"Monumenti Paleocristiani di Ravenna",city:"Ravenna",
  it:"Intro - Siamo a Ravenna, nel nord-est dell'Italia. Questa città ha una storia straordinaria: nel 402 d.C. divenne la capitale dell'Impero Romano d'Occidente. Successivamente fu centro del regno ostrogoto, poi della presenza bizantina. In questo periodo cruciale, tra il V e il VI secolo, furono costruiti otto monumenti religiosi che testimoniano l'incontro tra la tradizione romana, la fede cristiana e l'influenza dell'Oriente. Questi edifici, decorati con marmi preziosi, stucchi e soprattutto mosaici straordinari, ci raccontano una delle epoche più importanti della storia europea. Mausoleo di Galla Placidia - Galla Placidia era imperatrice figlia di Teodosio. È un edificio piccolo, ma gli interni sono riccamente decorati. I mosaici hanno un fondo blu scuro che rappresenta il cielo notturno, punteggiato di stelle dorate a forma di croce. La composizione è solenne: al centro si trova una croce, circondata da evangelisti. In una lunetta vediamo il Buon Pastore, figura simbolo di Cristo. Questi mosaici riflettono la tradizione architettonica romana occidentale. Battistero Neoniano - è considerato l'esempio più bello di battistero paleocristiano sopravvissuto. La cupola è decorata con un grande mosaico che rappresenta il Battesimo di Cristo al centro. Attorno a Cristo vediamo i dodici apostoli disposti in cerchio. I marmi intarsiati e gli stucchi ricchi completano la decorazione. È uno spettacolo di colori e light multicolori che cattura lo sguardo. Battistero degli Ariani - risale all'epoca di Teodorico, il re goto. Anche qui la cupola è decorata con mosaici, ma con un linguaggio iconografico diverso che riflette i principi della fede ariana. Il Battesimo di Cristo mantiene la sua centralità, ma la composizione segue una sensibilità artistica particolare di quel periodo. Basilica di Sant'Apollinare Nuovo - La Basilica fu costruita da Teodorico come cappella palatina. All'interno ci colpisce la presenza di due grandi cortei musivi che corrono lungo le pareti. Un corteo mostra 26 martiri che si dirigono verso Cristo, l'altro presenta 22 vergini che procedono verso la Vergine. Questi cortei sono elementi straordinari dell'arte musiva romana. L'edificio subì una riconversione cattolica dopo la caduta del dominio goto, e i mosaici furono modificati per riflettere la nuova fede. Basilica di San Vitale -  è un capolavoro dell'architettura bizantina, costruita sotto l'imperatore Giustiniano. Ha una pianta ottagonale, forma che combina elementi della tradizione occidentale con quella orientale. Ciò che ci colpisce sono i mosaici absidali: da un lato vediamo l'imperatore Giustiniano I con la sua corte, dall'altro la imperatrice Teodora con il suo seguito. Al centro, Cristo appare con il rotolo della legge e la corona del martirio, accanto a San Vitale. È una sintesi perfetta tra arte occidentale e orientale. Mausoleo di Teodorico Il Mausoleo di Teodorico è un'opera architettonica singolare e unica. È costruito con enormi blocchi di pietra d'Istria disposti attorno a uno spazio centrale. La copertura è una volta monolitica, sempre ricavata da un unico blocco di pietra. È l'unico esempio superstite di tomba di un re barbaro di questo periodo e rappresenta una fusione tra la tradizione romana e l'architettura ostrogota. Basilica di Sant'Apollinare in Classe A cinque chilometri da Ravenna troviamo la Basilica di Sant'Apollinare in Classe. È un edificio imponente con forme grandiose e un campanile cilindrico caratteristico. All'interno, l'abside è decorata con un mosaico che rappresenta la Trasfigurazione di Cristo in forma simbolica. Vediamo Sant'Apollinare in posizione orante, circondato da dodici agnelli che rappresentano gli apostoli. I marmi e i mosaici che ricoprono l'edificio creano un effetto di grande solennità. Chiusura I monumenti paleocristiani di Ravenna sono testimonianze uniche di un momento cruciale della storia europea. Rappresentano l'incontro tra la tradizione romana, la fede cristiana e l'arte dell'Oriente. I mosaici sono tra i migliori esempi sopravvissuti di questa forma d'arte in Europa. In questi edifici vediamo una straordinaria fusione di motivi e tecniche occidentali e orientali, che rende Ravenna un luogo dove la storia, l'arte e la religione si incontrano in modo indimenticabile.",
  en:"--- **Intro** - We are in Ravenna, in north-eastern Italy. This city has an extraordinary history: in 402 AD, it became the capital of the Western Roman Empire. It later served as the centre of the Ostrogothic kingdom, and then of Byzantine rule. During this crucial period, between the fifth and sixth centuries, eight religious monuments were built that bear witness to the meeting of Roman tradition, Christian faith, and Eastern influence. These buildings, decorated with precious marbles, stucco work, and above all extraordinary mosaics, tell the story of one of the most important epochs in European history. **The Mausoleum of Galla Placidia** - Galla Placidia was an empress, daughter of Theodosius. The building is small, but its interiors are richly decorated. The mosaics feature a deep blue background representing the night sky, scattered with golden stars in the shape of a cross. The composition is solemn: at the centre stands a cross, surrounded by the four evangelists. In one lunette we see the Good Shepherd, the symbolic figure of Christ. These mosaics reflect the architectural tradition of the Western Roman world. **The Neonian Baptistery** - This is considered the finest surviving example of an early Christian baptistery. The dome is decorated with a great mosaic depicting the Baptism of Christ at its centre. Surrounding Christ, the twelve apostles are arranged in a circle. Inlaid marbles and rich stucco work complete the decoration, creating a spectacular play of multicoloured light that draws the eye upward. **The Arian Baptistery** - This baptistery dates to the time of Theodoric, the Gothic king. Here too the dome is decorated with mosaics, but with a different iconographic language, one that reflects the principles of the Arian faith. The Baptism of Christ retains its central place, but the composition follows the particular artistic sensibility of that period. **The Basilica of Sant'Apollinare Nuovo** - The Basilica was built by Theodoric as a palatine chapel. Inside, we are immediately struck by two great mosaic processions running along the walls. One procession shows 26 martyrs making their way towards Christ, the other presents 22 virgins processing towards the Virgin Mary. These processions are extraordinary examples of Roman mosaic art. The building later underwent a Catholic conversion following the fall of Gothic rule, and the mosaics were modified to reflect the new faith. **The Basilica of San Vitale** - This is a masterpiece of Byzantine architecture, built under the Emperor Justinian. It has an octagonal floor plan, a form that combines elements of Western and Eastern tradition. What strikes us most are the apse mosaics: on one side we see the Emperor Justinian I with his court, on the other the Empress Theodora with her retinue. At the centre, Christ appears holding the scroll of the law and the crown of martyrdom, alongside Saint Vitalis. It is a perfect synthesis of Western and Eastern art. **The Mausoleum of Theodoric** - The Mausoleum of Theodoric is a singular and unique architectural work. It is constructed from enormous blocks of Istrian stone arranged around a central space. The roof is a monolithic vault, likewise cut from a single block of stone. It is the only surviving example of a barbarian king's tomb from this period, and represents a fusion of Roman tradition and Ostrogothic architecture. **The Basilica of Sant'Apollinare in Classe** - Five kilometres from Ravenna, we find the Basilica of Sant'Apollinare in Classe. It is an imposing building of grand proportions, with a distinctive cylindrical bell tower. Inside, the apse is decorated with a mosaic representing the Transfiguration of Christ in symbolic form. We see Saint Apollinaris in a posture of prayer, surrounded by twelve lambs representing the apostles. The marbles and mosaics that cover the interior create an effect of great solemnity. **Closing** - The early Christian monuments of Ravenna are unique testimonies to a crucial moment in European history. They represent the meeting of Roman tradition, Christian faith, and the art of the East. The mosaics are among the finest surviving examples of this art form anywhere in Europe. In these buildings, we witness an extraordinary fusion of Western and Eastern motifs and techniques, making Ravenna a place where history, art, and religion come together in a truly unforgettable way."},
  {region:"Friuli-Venezia Giulia",name:"Area Archeologica di Aquileia",city:"Udine",
  it:"INTRO Ci troviamo in provincia di Udine: Aquileia sorgeva a soli 5 km dal porto e fu una delle città romane più importanti del Mediterraneo. Fondata nel 181 a.C. importante porto tra il Mediterraneo e l'Europa centrale, e soprattutto una base militare contro le invasioni al confine nord-orientale dell'impero. STORIA La città crebbe rapidamente fino a diventare una delle più grandi e ricche del primo Impero Romano. La sua ricchezza si rifletteva nei magnifici edifici pubblici e nelle residenze private, di molte delle quali conserviamo ancora i resti.  452, quando la città fu saccheggiata e distrutta dagli Unni guidati da Attila. VIA SACRA iniziamo la nostra visita percorrendo la via sacra, una passeggiata archeologica all’ombra dei cipressi che ci porterà dal Porto Fluviale all’area della Basilica. Lungo questo percorso anticamente scorreva il fiume Natisone e possiamo vedere i resti dell’antico porto fluviale, in particolare notiamo i resti delle banchine dove le navi scaricavano le merci e gli anelli di ormeggio delle navi, e i magazzini. LE MURA Se guardiamo sopra le banchine possiamo vedere i resti delle mura di cinta. Il fiume diventava così un ulteriore presidio difensivo, e le mura erano rafforzate da torri. Queste mura e torri vennero costruire per combattere l’assedio di Massimino il Trace, primo imperatore barbaro di Roma, che con il suo esercito tentò di conquistare Aquileia Ma venne sconfitto. Possiamo notare più avanti un’altra linea di mura difensive probabilmente costruite più avanti. IL FORO ROMANO Andando avanti possiamo vedere  il foro romano, lo riconosciamo da queste bellissime colonne. Qui si svolgeva la vita amministrativa della città. Sui lati possiamo vedere le tabernae, le botteghe dell'epoca. In fondo, possiamo vedere la basilica che era il luogo  destinata all'attività amministrativo-giuridica, e il Macellum, il mercato cittadino. BASILICA PATRIARCALE: Concludiamo la nostra visita alla bellissima basilica patriarcale di Santa maria Assunta. Questa basilica romanica rappresenta il passaggio storico dall’impero romano al cristianesimo. Gli stupendi mosaici che vediamo sul pavimento sono i più antichi e i meglio conservati d’occidente. Possiamo notare i ritratti di Costantino e sua Madre Elena, che rappresentano la cristianità, vediamo Gesù rappresentato con la figura del buon pastore, alcuni ritratti dei donatori, il ciclo della storia di Giona e infine la dedica al vescovo Teodoro che fece costruire la basilica con l’aiuto dell’imperatore Costantino. CHIUSURA Aquileia è stata un’importantissima città: punto strategico e militare, porto commerciale, crocevia di culture tra il Mediterraneo e l'Europa centrale. Ma quello che oggi possiamo ammirare è solo una parte. La gran parte della città si conserva infatti ancora non scavata nel sottosuolo, e questo la rende una riserva archeologica unica nel suo genere: Aquileia è il più completo esempio di città imperiale romana del Mediterraneo ancora integro. Sotto i nostri piedi si cela ancora gran parte di una metropoli antica che aspetta di essere scoperta.",
  en:"--- **Intro** - We find ourselves in the province of Udine. Aquileia stood just five kilometres from its port, and was one of the most important Roman cities in the Mediterranean. Founded in 181 BC, it served as a major port connecting the Mediterranean to central Europe, and above all as a military base against invasions along the north-eastern frontier of the empire. **History** - The city grew rapidly to become one of the largest and wealthiest in the early Roman Empire. Its richness was reflected in magnificent public buildings and private residences, the remains of many of which we can still see today. This prosperity came to a violent end in 452 AD, when the city was sacked and destroyed by the Huns, under the leadership of Attila. **The Via Sacra** - We begin our visit by walking along the Via Sacra, an archaeological promenade in the shade of cypress trees, which will take us from the River Port to the area of the Basilica. Along this route, the River Natisone once flowed, and we can see the remains of the ancient river port. In particular, we notice the remnants of the wharves where ships once unloaded their cargo, the mooring rings used to secure the vessels, and the warehouses that lined the waterfront. **The Walls** - Looking above the wharves, we can see the remains of the city walls. The river thus became an additional line of defence, and the walls themselves were further reinforced by towers. These walls and towers were built to resist the siege of Maximinus Thrax, the first barbarian emperor of Rome, who led his army in an attempt to conquer Aquileia, but was ultimately defeated. A little further on, we can make out a second line of defensive walls, most likely built at a later date. **The Roman Forum** - Moving forward, we come to the Roman Forum, immediately recognisable by these beautiful columns. This was the administrative heart of the city, where public life was conducted. Along the sides we can see the tabernae, the commercial shops of the time. At the far end, we can make out the Basilica, the building dedicated to administrative and judicial affairs, and the Macellum, the city market. **The Patriarchal Basilica** - We conclude our visit at the beautiful Patriarchal Basilica of Santa Maria Assunta. This Romanesque basilica represents the great historical transition from the Roman Empire to Christianity. The magnificent mosaics we see on the floor are the oldest and best-preserved in the Western world. We can make out portraits of Constantine and his mother Helena, symbols of the new Christian faith. We see Jesus depicted as the Good Shepherd, portraits of the donors who funded the work, the cycle of the story of Jonah, and finally the dedication to Bishop Theodore, who had the basilica built with the support of the Emperor Constantine. **Closing** - Aquileia was a city of the greatest importance: a strategic military stronghold, a commercial port, and a crossroads of cultures between the Mediterranean and central Europe. Yet what we can admire today is only a part of the whole. The great majority of the city still lies unexcavated beneath the ground, and this makes it an archaeological reserve truly unique of its kind. Aquileia is the most complete example of an intact imperial Roman city in the entire Mediterranean world. Beneath our feet, much of an ancient metropolis still lies hidden, waiting to be discovered."},
  {region:"Lazio",name:"Castel Sant'Angelo",city:"Roma",
  it:"Intro Ci troviamo a Roma, sulle sponde del Tevere. Castel Sant'Angelo si erge di fronte a noi: è stato mausoleo imperiale, fortezza, residenza papale e prigione. Oggi è museo, e iniziamo la nostra salita attraverso duemila anni di storia e di architetture distinte, distribuite su più livelli. Storia Con il passare dei secoli, Roma cambiò. Nel Medioevo il mausoleo divenne fortezza, incluso nella cinta muraria per difendere la città. papa Gregorio Magno ebbe qui una visione: l'arcangelo Michele che rinfoderava la spada, simbolo della fine di una pestilenza. Da quel momento il monumento prese il nome di Castel Sant'Angelo. Successivamente il castello divenne residenza papale. I papi lo trasformarono progressivamente in una dimora magnifica, costruendo la struttura difensiva. Successivamente divenne prigione politica. La Rampa Elicoidale e il Mausoleo di Adriano (Età Romana.) Entriamo e ci troviamo di fronte alla rampa elicoidale, la scala a spirale, costruita per l'imperatore Adriano. Questo mausoleo venne costruito ispirandosi al Mausoleo di Augusto ma realizzando un edificio più grande. Mentre saliamo, vediamo la struttura originaria. Le pareti non avevano decorazioni, e questo ci permette di vedere la perfezione delle tecniche costruttive romane. Arriviamo infine alla camera sepolcrale, al centro del monumento. Ci sono le tombe di Adriano e sua moglie Vibia Sabina, insieme alle tombe di altri imperatori: Antonino Pio, Marco Aurelio, Settimio Severo. In questo  spazio solenne e silenzioso, Possiamo percepire la grandezza della storia romana. Il Cortile dell’Angelo e Ambienti Papali (Età Rinascimentale) Entriamo nel Cortile dell'Angelo, spazio di rappresentanza del Cinquecento. Di fronte a noi spicca l’Edicola della Cappella di Leone X disegnata da Michelangelo. Al centro svediamo la statua di San Michele Arcangelo di Raffaello da Montelupo, che prima era sulla terrazza più alta poi è stata sostituita perché danneggiata. Il Castello Fortificato e i Bastioni (Età Medievale e Moderna) Il castello fortificato è ripetutamente modificato nella storia, il castello rappresenta  la linea difensiva del monumento che lo ha trasformato da tomba imperiale a fortezza. Possiamo attraversarlo a piedi facendo il giro all'esterno sopra le mura della fortezza e vedere quanto fosse sicura e difficile da conquistare. Le Sale Farnesiane (Età Rinascimentale) Dopo questo giro Saliamo al piano superiore dove si trovano gli ambienti rinascimentali più fastosi e meglio conservati, si chiamano Sale Farnesiane, perché erano gli appartamenti privati di Paolo III Farnese. In queste sale possiamo vedere i bellissimi affreschi di  da Perin del Vaga e collaboratori. La Sala Paolina: È il monumentale salone di rappresentanza dove il papa accoglieva gli ambasciatori, riccamente decorato con stucchi bianchi e oro, figure allegoriche delle Virtù, affreschi sulla vita di Alessandro Magno e San Paolo, e giochi prospettici in trompe-l'oeil. Le Stanze Private di Paolo III: Lo studiolo, o Sala del Perseo, con il soffitto a cassettoni incentrato sull'eroe greco e un fregio che narra il mito tratto da Ovidio; e la camera da letto, o Sala di Amore e Psiche, con un fregio ispirato ad Apuleio e un soffitto ligneo recante gli stemmi Farnese e gli unicorni di Tiberio Crispi. Terrazza dell'Angelo (Età Moderna e Contemporanea) Da questo piano si accede direttamente alla Terrazza Panoramica, la sommità assoluta del castello. La vista da quassù è straordinaria: il Tevere scorre sotto di noi, possiamo vedere  la cupola di San Pietro e vedere questo splendido panorama su tutta Roma. Sulla terrazza vediamo anche la statua in bronzo dell'Arcangelo Michele, dello scultore Peter Anton van Verschaffelt, che celebra la storica visione dell'arcangelo Michele di papa Gregorio Magno",
  en:"--- **Intro** - We find ourselves in Rome, on the banks of the Tiber. Castel Sant'Angelo rises before us: it has been an imperial mausoleum, a fortress, a papal residence, and a prison. Today it is a museum, and we begin our ascent through two thousand years of history and distinct architectural layers, spread across multiple levels. **History** - As the centuries passed, Rome changed. In the Middle Ages, the mausoleum became a fortress, incorporated into the city walls to defend the city. Pope Gregory the Great had a vision here: the Archangel Michael sheathing his sword, a symbol of the end of a plague. From that moment on, the monument took the name of Castel Sant'Angelo. In time, the castle became a papal residence, and the popes progressively transformed it into a magnificent dwelling, building upon its existing defensive structure. It later served as a political prison. **The Helical Ramp and the Mausoleum of Hadrian — Roman Period** - We enter and find ourselves before the helical ramp, the great spiral passageway built for the Emperor Hadrian. This mausoleum was inspired by the Mausoleum of Augustus, but conceived on an even grander scale. As we climb, we can observe the original structure around us. The walls were left without decoration, and this allows us to appreciate the perfection of Roman construction techniques. We arrive at last at the burial chamber, at the very heart of the monument. Here lie the tombs of Hadrian and his wife Vibia Sabina, together with the tombs of other emperors: Antoninus Pius, Marcus Aurelius, and Septimius Severus. In this solemn and silent space, we can sense the full weight of Roman greatness. **The Courtyard of the Angel and the Papal Rooms — Renaissance Period** - We enter the Courtyard of the Angel, a ceremonial space created in the sixteenth century. Before us stands the Aedicule of the Chapel of Leo X, designed by Michelangelo. At the centre, we see the statue of the Archangel Michael by Raffaello da Montelupo, which once stood on the highest terrace before being brought down due to damage. **The Fortified Castle and the Bastions — Medieval and Modern Period** - Repeatedly modified throughout history, the fortified castle represents the defensive character of the monument, which transformed it from an imperial tomb into a stronghold. We can walk around the outside, along the top of the fortress walls, and appreciate just how secure and difficult to conquer this structure once was. **The Farnese Rooms — Renaissance Period** - After this circuit, we climb to the upper floor, where the most lavish and best-preserved Renaissance interiors are found. These are known as the Farnese Rooms, as they served as the private apartments of Pope Paul III Farnese. In these halls we can admire the magnificent frescoes by Perin del Vaga and his collaborators. **The Sala Paolina** - This is the monumental reception hall where the pope received ambassadors. It is richly decorated with white and gold stucco work, allegorical figures of the Virtues, frescoes depicting scenes from the lives of Alexander the Great and Saint Paul, and skilful trompe-l'oeil perspective effects. **The Private Rooms of Paul III** - First, the studiolo, or Sala del Perseo, with a coffered ceiling centred on the Greek hero, and a frieze narrating the myth as told by Ovid. Then the bedchamber, or Sala di Amore e Psiche, with a frieze inspired by Apuleius and a wooden ceiling bearing the Farnese coat of arms and the unicorns of Tiberio Crispi. **The Terrace of the Angel — Modern and Contemporary Period** - From this level, we step directly onto the Panoramic Terrace, the very summit of the castle. The view from up here is extraordinary: the Tiber flows below us, and we can take in the dome of Saint Peter's and a breathtaking panorama across the whole of Rome. On the terrace, we also see the bronze statue of the Archangel Michael, by the sculptor Peter Anton van Verschaffelt, which celebrates the historic vision of Pope Gregory the Great."},
  {region:"Lazio",name:"Domus Aurea",city:"Roma",
  it:"Intro: Siamo a Roma, nell'anno 64 dopo Cristo. Un grande incendio distrugge gran parte della città. L'imperatore Nerone usa questo momento per ricostruire la città e una villa enorme: la Domus Aurea, che significa Casa d'Oro. Questa villa copre una zona molto grande della città, tra i colli del Palatino e l'Oppio. È il simbolo del potere e dell'orgoglio di Nerone. Storia: La Domus Aurea non è un solo edificio. Era una villa grandissima formata da molti edifici e, giardini, boschi e vigne. Al centro c'era un lago artificiale, nel posto dove oggi si trova il Colosseo. Le pareti erano coperte di oro e pietre preziose e dipinte dal famoso pittore Fabullus. Dopo la morte di Nerone, il palazzo venne distrutto e sui resti l'imperatore traiano costruì le Terme e questo ha permesso alla domus aurea di conservarsi. Al posto del grande lago artificiale fu costruito il Colosseo. Nel Rinascimento, sotto i resti delle terme venne scoperta la Domus e artisti famosi come Raffaello e Pinturicchio entrano a esplorare queste grotte. Trovano affreschi bellissimi e li copiano. Da questi disegni nasce uno stile nuovo chiamato grottesco, che diventa molto popolare nel Cinquecento. Interno: Siamo dunque sul colle oppio dove sono presenti i Padiglioni meglio conservati e possiamo far il nostro ingresso nella domus aurea. Siamo in un ambiente di circa 150 stanze, tutte collegate tra loro. Le stanze sono state costruite con mattoni e la maggior parte ha un soffitto a forma di arco, volta a botte. Al centro di tutto il palazzo troveremo una sala a forma di ottagono La prima zona che visitiamo è quella occidentale, dove c'è un cortile con un giardino di forma rettangolare, circondato da colonne in stile ionico. Attorno al cortile vediamo le stanze che probabilmente erano riservate all'uso privato di Nerone. In questa zona si trova la Sala della volta delle civette, che prende il nome dalle civette dipinte sul soffitto. Sempre in questa zona possiamo osservare il Ninfeo di Ulisse e Polifemo, che prende il nome da un mosaico al centro del soffitto, il quale racconta la storia di Ulisse e del gigante Polifemo, tratta dall’Odissea. Spostamoci ora verso la zona orientale del palazzo, tutto ruota attorno alla grande sala ottagonale. Qui si trova la Sala della volta dorata, il cui soffitto è decorato con stucchi colorati e ricchissimi. Troviamo poi la Sala di Achille a Sciro, il cui nome viene dalla scena dipinta al centro del soffitto, che racconta un episodio famoso tratto dall'Iliade di Omero. Infine la Sala di Ettore e Andromaca, anche questa ispirata ai personaggi del grande poema epico greco. é molto interessante notare che iin questo palazzo non ci sono porte interne, né bagni, né stanze per i domestici, né impianti di riscaldamento. Per questo gli studiosi pensano che non fosse una residenza vera e propria dove Nerone viveva ogni giorno, ma probabilmente un luogo di piacere e di riposo, dove l'imperatore e i suoi ospiti trascorrevano il tempo circondati da opere d'arte e dalla bellezza della natura.",
  en:"--- **Intro** - We are in Rome, in the year 64 AD. A great fire destroys much of the city. The Emperor Nero seizes this moment to rebuild the city, and to construct an enormous villa: the Domus Aurea, which means Golden House. This villa covers a vast area of the city, between the Palatine and Oppian Hills. It is the symbol of Nero's power and ambition. **History** - The Domus Aurea is not a single building. It was an immense villa made up of many structures, gardens, woodlands, and vineyards. At its centre lay an artificial lake, in the very place where the Colosseum stands today. The walls were covered in gold and precious stones, and painted by the celebrated artist Fabullus. After Nero's death, the palace was destroyed, and the Emperor Trajan built his Baths over the ruins, a circumstance that paradoxically allowed the Domus Aurea to survive beneath them. In place of the great artificial lake, the Colosseum was erected. During the Renaissance, the Domus was rediscovered beneath the ruins of the Baths, and famous artists such as Raphael and Pinturicchio descended to explore these underground caves. They found extraordinary frescoes, and copied them. From these drawings, a new decorative style was born, known as grotesque, which became enormously popular throughout the sixteenth century. **The Interior** - We are here on the Oppian Hill, where the best-preserved pavilions are located, and we now make our entrance into the Domus Aurea. We find ourselves in an environment of approximately 150 rooms, all interconnected. The rooms were built in brick, and the majority are covered by arched ceilings, in the form of barrel vaults. At the very heart of the palace, we will find a room with an octagonal plan. The first area we visit is the western zone, where a courtyard with a rectangular garden is surrounded by columns in the Ionic style. Around the courtyard we can see the rooms that were most likely reserved for Nero's private use. In this area stands the Hall of the Vault of the Owls, named after the owls painted on its ceiling. Also in this zone, we can observe the Nymphaeum of Ulysses and Polyphemus, which takes its name from a mosaic at the centre of the ceiling, depicting the story of Ulysses and the giant Polyphemus, drawn from the Odyssey. We now move towards the eastern zone of the palace, where everything revolves around the great octagonal hall. Here we find the Hall of the Golden Vault, whose ceiling is decorated with extraordinarily rich and colourful stucco work. We then come to the Hall of Achilles at Skyros, whose name derives from the scene painted at the centre of the ceiling, depicting a famous episode from Homer's Iliad. Finally, we reach the Hall of Hector and Andromache, also inspired by characters from the great Greek epic poem. It is particularly interesting to note that this palace has no internal doors, no bathrooms, no rooms for domestic staff, and no heating systems. For this reason, scholars believe it was not a true residence where Nero lived day to day, but most likely a place of pleasure and retreat, where the emperor and his guests spent their time surrounded by works of art and the beauty of the natural world."},
  {region:"Lazio",name:"Villa Adriana",city:"Tivoli",
  it:"Intro: in questa zona esisteva già una residenza più antica di epoca repubblicana. Questa proprietà passò probabilmente alla moglie di Adriano, Vibia Sabina, e divenne il primo nucleo attorno al quale nacque la grande villa dell’imperatore. La villa non era solo una residenza privata: era un luogo pensato per vivere, ricevere ospiti importanti e gestire il potere. La sua grandezza rispecchiava la visione di Adriano, un imperatore dal carattere forte e dalla mentalità innovativa, che voleva distinguersi nettamente dal popolo. Nei suoi edifici voleva richiamare i luoghi e i monumenti più belli che aveva visto durante i suoi viaggi nell'impero, come la Grecia e l'Egitto. Ingresso: Percorriamo questo bellissimo viale di cipressi e giungiamo Pecile, si tratta di un portico con colonne intorno e al centro un grande giardino con una vasca d'acqua. Non era un luogo di festa, ma un posto tranquillo, circondato da mura altissime, pensato per le passeggiate dell'imperatore, Canopo:Iniziamo la nostra visita e possiamo subito ammirare il canopo che voleva evocare un braccio del fiume nilo rievocazione simbolica del viaggio di Adriano in Egitto. vediamo una piscina con i resti di un colonnato con copie di famose statue greche che erano rivolte verso la piscina creando così un riflesso incantevole sulla superficie dell'acqua. In fondo alla piscina troviamo un edificio con una grande sala principale coperta da una cupola, circondata da nicchie. Qui c’era un triclinio, cioè una sala da pranzo all'aperto, destinata ai banchetti ufficiali dell'imperatore. Teatro Marittimo: Vediamo ora il teatro marittimo forse il monumento più famoso di villa adriana. Al suo interno è presente un portico circolare a colonne ioniche con un canale d’acqua e al centro un isolotto al dove c’era una piccola villa in miniatura. Qui probabilmente Adriano si ritirava per riposarsi e per studiare. Terme: Arriviamo ora alle Terme.Possiamo vedere le grandi terme e le piccole terme che erano destinate alla famiglia imperiale e agli ospiti prestigiosi. c’erano decorazioni marmoree e affreschi per stupire gli ospiti. Arriviamo ora alla piazza d'oro era un'area esclusiva riservata l'imperatore e dei suoi ospiti ed era legata alle funzioni pubbliche di palazzo. Possiamo concludere il nostro tour qui sulla sommità della Roccabruna in cui possiamo ammirare un bellissimo panorama sul panorama circostante.",
  en:"--- **Intro** - In this area there already existed an older residence, dating back to the Republican period. This property most likely passed to Hadrian's wife, Vibia Sabina, and became the first nucleus around which the emperor's great villa would grow. The villa was not simply a private residence: it was a place conceived for living, for receiving important guests, and for exercising power. Its grandeur reflected the vision of Hadrian himself, an emperor of strong character and innovative mind, who wished to distinguish himself clearly from those around him. In the buildings he created, he sought to evoke the most beautiful places and monuments he had encountered during his travels across the empire, from Greece to Egypt. **The Entrance** - We walk along this beautiful avenue of cypress trees and arrive at the Pecile, a porticoed enclosure with columns all around, and at its centre a large garden with a long pool of water. This was not a place of celebration, but a tranquil space, enclosed by very high walls, designed for the emperor's private walks and contemplation. **The Canopus** - We begin our visit and are immediately greeted by the Canopus, conceived to evoke a branch of the River Nile, a symbolic reminiscence of Hadrian's journey to Egypt. We see a long pool, bordered by the remains of a colonnade with copies of famous Greek statues, which once faced the water, creating an enchanting reflection on its surface. At the far end of the pool stands a building with a great main hall covered by a dome, surrounded by niches. Here there was a triclinium, an open-air dining room, used for the emperor's official banquets. **The Maritime Theatre** - We now come to the Maritime Theatre, perhaps the most celebrated monument of Villa Adriana. At its heart lies a circular portico with Ionic columns, enclosing a water channel, and at the centre a small island on which stood a miniature villa. This was most likely where Hadrian would withdraw to rest, to read, and to think. **The Baths** - We arrive now at the Baths. Here we can see both the Large Baths and the Small Baths, the latter reserved for the imperial family and distinguished guests. Marble decorations and frescoes were used throughout to impress all who entered. **The Piazza d'Oro** - We arrive at the Piazza d'Oro, an exclusive area reserved for the emperor and his guests, connected to the official and ceremonial functions of the palace. We conclude our tour here, at the summit of the Roccabruna, where we can take in a beautiful panoramic view over the surrounding landscape."},
  {region:"Lazio",name:"Villa d'Este",city:"Tivoli",
  it:"Intro: Questa villa fu voluta dal cardinale Ippolito d'Este, figlio di Alfonso I e Lucrezia Borgia, nel Cinquecento. Il Papa Giulio III lo aveva nominato governatore di Tivoli, ma al suo arrivo il cardinale trovò solo un vecchio convento dei benedettini. Decise di trasformarlo in una villa sontuosa, affidando i lavori all'architetto Pirro Ligorio. I lavori durarono decenni, tra difficoltà economiche e cambi di potere, e il cardinale riuscì a vedere la villa inaugurata solo nel settembre del 1572, pochi mesi prima di morire. Nel 1918 la villa passò allo Stato italiano, che la restaurò e la aprì al pubblico. Interno: Entriamo nella villa e ci troviamo al piano nobile, dove possiamo ammirare gli affreschi sulle pareti e sui soffitti. Questi dipinti sono stati fatti da alcuni artisti diretti da Livio Agresti da Forlì. Scendiamo ora al piano inferiore e ci troviamo nell’appartamento nobile. In particolare possiamo ammirare il Salone della Fontanina, detto anche del Concilio degli Dei, il nome deriva dal grande affresco sul soffitto. Sulla parete orientale è dipinto il progetto originale della villa, con il palazzo ancora in costruzione, un cantiere dipinto dentro la villa stessa. Grotta di Diana Uscendo dalla villa e scendendo nel giardino, sulla sinistra possiamo vedere la Grotta di Diana. È completamente rivestita di mosaici di pietre, stucchi e decorazioni a smalto. Sulle pareti sono rappresentate cinque scene mitologiche: la trasformazione di Dafne in alloro, Andromeda liberata da Perseo, Atteone trasformato in cervo da Artemide, Siringa tramutata in canna, e Callisto trasformata in orsa. Le statue originali che la decoravano, tra cui Diana cacciatrice e Minerva, si trovano oggi ai Musei Capitolini. Giardino: Entriamo ora nel giardino e possiamo vedere la la Fontana dell'Ovato, detta anche Regina delle fontane. Ha una forma ovale con una grande vasca centrale dove confluiscono tutte le acque. Al centro si trova la Sibilla tiburtina, ai lati le statue dei fiumi Aniene ed Erculaneo. La balaustra marmorea si apre al centro per formare una cascata a cupola e possiamo percorrerla e camminarci sotto. Proseguiamo e possiamo ammirare le Cento Fontane, un lungo viale pieno di bellissime fontane. Possiamo ammirare lungo il viale due file di mascheroni zampillanti e le, aquile che simboli della famiglia d'Este. La terza è la Fontana dei Draghi, il cuore del parco. Fu costruita in una sola notte, secondo la leggenda, per omaggiare papa Gregorio XIII in visita alla villa. Quattro draghi disposti a cerchio sputano getti d'acqua, mentre un potente zampillo centrale si innalza verso il cielo. Il tutto richiama la fatica di Ercole contro il drago Ladone. La quarta è la Fontana dell'Organo, unica nel suo genere. Il meccanismo interno, azionato dalla forza dell'acqua, faceva suonare un vero organo idraulico. La caduta dell'acqua in una cavità sotterranea comprimeva l'aria nelle canne dell'organo, producendo melodie. Si racconta che papa Gregorio XIII, durante la sua visita, rimase così stupito da andare a controllare di persona se qualcuno stesse suonando. Possiamo sentire la fontana risuona di nuovo ogni due ore. Siamo arrivati in fondo al viale delle Cento Fontane e possiamo ammirare l’ultima: La Rometta. È una rappresentazione in miniatura di Roma antica con al centro la statua di Roma Vittoriosa, la Lupa con Romolo e Remo, un canale a forma curva che rappresenta il Tevere e una nave al centro che simboleggia l'Isola Tiberina.",
  en:"--- **Intro** - This villa was commissioned by Cardinal Ippolito d'Este, son of Alfonso I and Lucrezia Borgia, in the sixteenth century. Pope Julius III had appointed him Governor of Tivoli, but on his arrival the Cardinal found only an old Benedictine convent. He decided to transform it into a sumptuous villa, entrusting the work to the architect Pirro Ligorio. Construction lasted for decades, amid financial difficulties and shifts in power, and the Cardinal was able to see the villa inaugurated only in September 1572, just a few months before his death. In 1918, the villa passed to the Italian State, which restored it and opened it to the public. **The Interior** - We enter the villa and find ourselves on the piano nobile, where we can admire the frescoes on the walls and ceilings. These paintings were executed by a group of artists directed by Livio Agresti da Forlì. We now descend to the lower floor, and enter the noble apartment. Here we can admire in particular the Salone della Fontanina, also known as the Hall of the Council of the Gods, a name derived from the great fresco on the ceiling. On the eastern wall, the original design of the villa is painted, showing the palace still under construction, a building site depicted within the very building itself. **The Grotto of Diana** - Leaving the villa and descending into the garden, we can see on the left the Grotto of Diana. It is entirely covered in mosaics of stone, stucco work, and enamel decoration. On the walls, five mythological scenes are depicted: the transformation of Daphne into a laurel tree, Andromeda freed by Perseus, Actaeon transformed into a stag by Artemis, Syrinx turned into a reed, and Callisto transformed into a bear. The original statues that once decorated it, including Diana the Huntress and Minerva, are today housed in the Capitoline Museums. **The Garden** - We now enter the garden, and can see the Fountain of the Oval, also known as the Queen of the Fountains. It has an oval form, with a large central basin into which all the waters converge. At the centre stands the Tiburtine Sibyl, and on either side the statues of the rivers Aniene and Erculaneo. The marble balustrade opens at its centre to form a domed waterfall, and we can walk along it and pass beneath the cascading water. Continuing on, we come to the Hundred Fountains, a long avenue filled with beautiful water features. Along this path we can admire two rows of spouting masks, and the eagles, symbols of the Este family. The third great fountain is the Fountain of the Dragons, the heart of the park. According to legend, it was built in a single night, as a tribute to Pope Gregory XIII during his visit to the villa. Four dragons arranged in a circle shoot jets of water, while a powerful central spout rises high into the sky. The whole composition evokes the labour of Hercules against the dragon Ladon. The fourth is the Fountain of the Organ, unique of its kind. The internal mechanism, powered by the force of the water, once played a real hydraulic organ. Water falling into an underground cavity compressed the air through the organ pipes, producing melodies. It is said that Pope Gregory XIII, during his visit, was so astonished that he went to check in person whether someone was playing. The fountain can still be heard sounding again every two hours. We have now reached the far end of the avenue of the Hundred Fountains, and we come to the last: the Rometta. It is a miniature representation of ancient Rome, with at its centre the statue of Victorious Rome, the She-Wolf with Romulus and Remus, a curved canal representing the Tiber, and a ship at the centre symbolising the Tiber Island."},
  {region:"Lazio",name:"Villa dei Quintili",city:"Roma",
  it:"Siamo sull’appia antica precisamente al quinto miglio e possiamo ammirare La Villa dei Quintili una grandissima villa che apparteneva ai fratelli Sesto Quintilio Condiano e Sesto Quintilio Valerio Massimo, consoli dell’impero. L'imperatore Commodo li fece uccidere con l'accusa di congiura per poter ottenere La villa, e da allora divenne residenza imperiale. Antiquarium: Entrando nella villa possiamo ammirare l'antiquarium. Si tratts di uno spazio espositivo dedicato alla conservazione e alla presentazione dei numerosi reperti rinvenuti Durante gli scavi del sito. Questi reperti ci permettono di ammirare opere d'arte, i mosaici, le sculture e glin oggetti di uso quotidiano che risalgono all'epoca Romana offrendo un'importante testimonianza della vita dei suoi abitanti. Ambienti: Proseguiamo la visita osservando gli ambienti di rappresentanza che  erano dedicati alla ricezione degli ospiti e alle attività pubbliche dei proprietari. Questi ambienti privati erano riservati ai membri della famiglia e ai loro momenti di riposo. Gli ambienti di servizio erano destinati alle attività quotidiane e al personale della villa nella villa. Possiamo notare anche i resti di un anfiteatro privato utilizzato per intrattenimenti degli ospiti e i Giardini che creavano un ambiente sereno decorativo. Le terme:  Possiamo ora ammirare le terme, un esempio eccezionale delle abilità ingegneristiche e del lusso dell'epoca Romana costruite per offrire agli ospiti un luogo di relax e benessere. Possiamo notare il frigidarium che era la stanza per i bagni freddi. Successivamente troviamo una zona di transizione tra il calidarium e il frigidarium per i bagni tiepidi e infine la stanza per i bagni caldi: il calidarium che era riscaldata da un sofisticato sistema di ipocausto vediamo ora il teatro. Si tratta di uno spazio dedicato all'intrattenimento e alla cultura. le Arti performative erano molto importanti nella società romana. dopo il teatro presenti le cisterne che erano fondamentali per la gestione delle risorse idriche e la gestione dell'acqua. L’acqua serviva per  il comfort e il lusso della Residenza Al termine della visita troviamo Il Ninfeo era un luogo dedicato al culto delle Ninfe e alla celebrazione dell'acqua come fonte di vita e bellezza. C’erano delle fontane e bellissimi mosaici sul pavimento e possiamo osservare alcuni resti. Il ninfeo faceva parte dell’ingresso nella villa. Santa Maria Nova Concludiamo la visita e muoviamo nell'area di Santa Maria Nova, accessibile dallo stesso ingresso della Villa dei Quintili. Storia: Questa tenuta prende il nome dall'antica chiesa di Santa Maria Novae, alla quale appartenne per tutto il Medioevo. Nel 2006 lo Stato italiano la acquistò da un privato. La zona si trovava in totale abbandono. Dopo anni di scavi e restauri, l'area è stata aperta al pubblico e oggi costituisce una delle scoperte più importanti degli ultimi anni sull'Appia Antica. Il casale e la cisterna: Il primo edificio che vedete è il casale, una costruzione di tre piani che ingloba una torre di avvistamento medievale e, al di sotto, una grande cisterna romana a due piani usata nell'antichità per distribuire l'acqua alla vicina Villa dei Quintili. Il tetto è stato coperto per metà con vetro, per lasciare visibile la torre che lo sovrasta. Le terme e i mosaici: Gli scavi hanno riportato alla luce un complesso termale con un frigidarium con pavimento in marmo, un calidarium e due salette con mosaici raffiguranti scene di circo e di arena, con il sistema di riscaldamento dell'età di Commodo. I mosaici sono la scoperta più straordinaria di tutta l'area. Sono due pavimenti in tessere bianche e nere perfettamente conservati: su uno è raffigurato un gladiatore con la scritta del nome Montanus, che rappresenta un evento di gladiatori realmente accaduto, sull'altro quattro cavalli dei giochi circensi, erano le squadre che facevano le corse nel circo. Quest'area era probabilmente destinata ai soldati dell'imperatore Commodo, messa qui a guardia della Villa dei Quintili. Era quindi la caserma delle guardie del corpo dell'imperatore.",
  en:"--- **Intro** - We are on the Appian Way, at the fifth milestone, and before us stands the Villa of the Quintilii, an enormous country residence that once belonged to the brothers Sextus Quintilius Condianus and Sextus Quintilius Valerius Maximus, consuls of the empire. The Emperor Commodus had them put to death on charges of conspiracy, in order to seize the villa for himself, and from that moment on it became an imperial residence. **The Antiquarium** - Entering the villa, we come to the Antiquarium. This is an exhibition space dedicated to the preservation and display of the many finds uncovered during excavations of the site. These objects allow us to admire works of art, mosaics, sculptures, and everyday items dating to the Roman period, offering an important testimony to the lives of those who once inhabited this place. **The Rooms** - We continue our visit through the reception rooms, which were dedicated to welcoming guests and to the public activities of the owners. The private rooms, by contrast, were reserved for members of the family and their moments of rest. The service areas were given over to the daily activities of the villa's staff. We can also make out the remains of a private amphitheatre, used for the entertainment of guests, and the gardens, which created a serene and decorative environment. **The Baths** - We can now admire the baths, an exceptional example of the engineering skills and luxury of the Roman period, built to offer guests a place of relaxation and wellbeing. We notice the frigidarium, the room for cold baths. Moving on, we find a transitional zone between the caldarium and the frigidarium, used for lukewarm bathing. Finally, we reach the caldarium, the room for hot baths, heated by a sophisticated underfloor heating system known as a hypocaust. We now come to the theatre, a space dedicated to entertainment and culture. The performing arts held a central place in Roman society. Beyond the theatre, we find the cisterns, which were essential for managing the villa's water supply. Water was fundamental to the comfort and luxury of this great residence. At the end of our visit through the villa, we reach the Nymphaeum, a place dedicated to the cult of the Nymphs and to the celebration of water as a source of life and beauty. Fountains and beautiful floor mosaics once adorned this space, and we can observe some of their remains today. The Nymphaeum formed part of the original entrance to the villa. **Santa Maria Nova** - We conclude our visit and move into the area of Santa Maria Nova, accessible from the same entrance as the Villa of the Quintilii. **History** - This estate takes its name from the ancient church of Santa Maria Nova, to which it belonged throughout the Middle Ages. In 2006, the Italian State purchased it from a private owner. The area had fallen into total abandonment. After years of excavations and restoration work, it has been opened to the public, and today represents one of the most important discoveries of recent years along the Appian Way. **The Farmhouse and the Cistern** - The first building we see is the farmhouse, a three-storey structure that incorporates a medieval watchtower, and beneath it, a large two-storey Roman cistern, used in antiquity to distribute water to the nearby Villa of the Quintilii. Half of the roof has been covered with glass, to keep the tower above visible to visitors. **The Baths and the Mosaics** - Excavations have brought to light a bathing complex with a frigidarium featuring a marble floor, a caldarium, and two smaller rooms with mosaics depicting scenes from the circus and the arena, complete with the heating system from the age of Commodus. The mosaics are the most extraordinary discovery in the entire area. They are two perfectly preserved floors in black and white tesserae: one depicts a gladiator, with his name, Montanus, written alongside, representing a real gladiatorial event that actually took place. The other shows four horses from the circus games, the teams that competed in the chariot races. This area was most likely intended for the soldiers of the Emperor Commodus, stationed here to guard the Villa of the Quintilii. It was, in other words, the barracks of the emperor's own bodyguard."},
  {region:"Liguria",name:"Strade Nuove e Palazzi dei Rolli",city:"Genova",
  it:"Siamo a Genova, nel cuore di una delle repubbliche marinare più potenti della storia. Tra il Cinquecento e il Seicento, grazie alla svolta politica impressa da Andrea Doria, la Repubblica di Genova divenne molto potente e  il principale centro finanziario d'Europa, banchiere dei re di Spagna e città che controllava il mare. Doria non fu mai Doge della città, preferendo il titolo di Padre della Patria era l’uomo più potente. Strade Nuove: quando Genova era al culmine della propria ricchezza, la Repubblica decise di costruire una strada completamente nuova, progettata a tavolino, dritta, pianeggiante e larga, in una città che fino ad allora era un labirinto di vicoli medievali stretti e tortuosi. Via Garibaldi, allora chiamata Strada Nuova o Via Aurea, era un rettilineo e poi divisa in lotti messi all'asta pubblicamente. Le famiglie più ricche di Genova acquistarono i lotti e vi costruirono i loro palazzi seguendo regole precise, in modo che l'intera strada avesse un aspetto uniforme e scenografico. La novità assoluta era che non si trattava di una crescita spontanea come nelle città medievali, ma di un piano urbanistico voluto e coordinato dall'autorità pubblica, il primo esempio di questo tipo in tutta Europa rinascimentale. Via Garibaldi univa il vecchio centro medievale a sud e le nuove espansioni della città a nord, e servì anche per migliorare un'area degradata del centro antico. Successivamente furono costruite anche Via Balbi nel Seicento e Via Cairoli nel Settecento, con lo stesso principio. Insieme, queste strade hanno camiato completamente il volto della città, diventando il simbolo visibile della potenza e del buon gusto di Genova. I Rolli sono uno dei sistemi più originali e geniali della storia europea. Si tratta di un sistema a sorteggio, i Rolli erano appunto gli elenchi ufficiali, obbligava le famiglie nobiliari più ricche ad ospitare le visite di Stato di Papi, Re, imperatori per la Repubblica nei propri eleganti palazzi. Quando un ospite illustre arrivava a Genova, la Repubblica non pagava un albergo: sorteggiava quale palazzo nobile avrebbe dovuto accoglierlo. Il sistema aveva oltre 150 palazzi, di cui 42 oggi tutelati dall'UNESCO. I Palazzi dei Rolli, di stile rinascimentale e barocco, sono avevano da caratteristiche scenografiche uniche: scalinate all'ingresso, i cortili colonnati, le logge affacciate su giardini pensili e gli interni decorati con stucchi e affreschi monumentali. i Musei di Strada Nuova, trasformando Via Garibaldi in una vera e propria strada-museo. Palazzo Rosso, conosciuto per il caratteristico colore rosso-ocra della sua facciata, è un edificio del 600 fatto costruire dalla nobile famiglia Brignole Sale. È una straordinaria casa-museo dove rivive il fascino della dimora aristocratica, con le ricche collezioni d'arte e gli arredi storici della famiglia in ambienti sontuosamente decorati da affreschi e stucchi. Tra le opere che potete ammirare ci sono i celebri ritratti fiamminghi di Van Dyck, tra cui il Cristo portacroce, e capolavori di Guercino come la splendida Cleopatra morente, oltre a opere di Veronese. Palazzo Bianco è la principale pinacoteca della Liguria. Il percorso espositivo propone un itinerario straordinario tra i maestri del Cinquecento italiano ed europeo, i pittori fiamminghi e nordici, da Gérard David a Rubens, e la ricca scuola pittorica genovese. Tra i capolavori assoluti della collezione spicca l'Ecce Homo di Caravaggio e la Maddalena penitente di Antonio Canova Palazzo Tursi è il più grande e imponente dei tre palazzi ed è anche l'attuale sede del Comune di Genova. La principale attrazione è la Sala Paganini, dedicata al celeberrimo compositore genovese Niccolò Paganini, dove è custodito il famoso violino il Cannone che Paganini adoperò e amò per tutta la vita e che lasciò alla sua città natale affinché fosse perpetuamente conservato. Il violino viene fatto suonare tradizionalmente dal vincitore del Premio Paganini, concorso internazionale di violino tra i più prestigiosi al mondo e in altre occasioni importanti. Nelle sale del palazzo è inoltre esposta una ricca selezione delle storiche collezioni di monete, pesi e misure ufficiali dell'antica Repubblica di Genova.",
  en:"--- **Intro** - We are in Genoa, at the heart of one of the most powerful maritime republics in history. Between the sixteenth and seventeenth centuries, thanks to the political vision of Andrea Doria, the Republic of Genoa became extraordinarily powerful, establishing itself as the principal financial centre of Europe, banker to the kings of Spain, and master of the seas. Doria never held the title of Doge, preferring instead to be known as Father of the Fatherland. He was, in every sense, the most powerful man in the city. **The Strade Nuove** - When Genoa was at the height of its wealth, the Republic decided to build an entirely new street, planned from scratch, straight, level, and wide, in a city that until then had been a labyrinth of narrow, winding medieval lanes. Via Garibaldi, then known as the Strada Nuova, or Golden Street, was laid out as a straight avenue, divided into plots that were put up for public auction. The wealthiest families of Genoa purchased these plots and built their palaces according to precise rules, so that the entire street would present a uniform and theatrical appearance. The absolute novelty was that this was not the spontaneous growth typical of medieval cities, but a deliberate, coordinated urban plan, the first example of its kind in all of Renaissance Europe. Via Garibaldi connected the old medieval centre to the south with the new expansions of the city to the north, and also served to regenerate a degraded area of the historic centre. Via Balbi followed in the seventeenth century, and Via Cairoli in the eighteenth, both built on the same principle. Together, these streets completely transformed the face of the city, and became the visible symbol of Genoa's power and refinement. **The Rolli** - The Rolli are one of the most original and ingenious systems in European history. Based on a lottery, the Rolli were the official registers that obliged the wealthiest noble families to host state visits by popes, kings, and emperors on behalf of the Republic, in their own elegant palaces. When an illustrious guest arrived in Genoa, the Republic did not pay for a hotel: it drew lots to determine which noble palace would receive them. The system encompassed over 150 palaces, 42 of which are today protected by UNESCO. The Palazzi dei Rolli, built in Renaissance and Baroque style, featured unique theatrical characteristics: grand entrance staircases, colonnaded courtyards, loggias overlooking hanging gardens, and interiors decorated with monumental stucco work and frescoes. **The Museums of Strada Nuova** - Via Garibaldi has been transformed into a true museum street, through the Musei di Strada Nuova. **Palazzo Rosso**, known for the characteristic red-ochre colour of its façade, is a seventeenth-century building commissioned by the noble Brignole Sale family. It is an extraordinary house-museum where the atmosphere of an aristocratic residence lives on, with the family's rich art collections and historic furnishings displayed in sumptuously decorated rooms of frescoes and stucco work. Among the works on display are celebrated Flemish portraits by Van Dyck, including the Christ Carrying the Cross, and masterpieces by Guercino, such as the magnificent Dying Cleopatra, alongside works by Veronese. **Palazzo Bianco** is the principal art gallery of Liguria. The exhibition traces an extraordinary path through the masters of sixteenth-century Italian and European painting, the Flemish and Northern painters from Gérard David to Rubens, and the rich Genoese school of painting. Among the absolute masterpieces of the collection, the Ecce Homo by Caravaggio and the Penitent Magdalene by Antonio Canova stand out above all. **Palazzo Tursi** is the largest and most imposing of the three palaces, and is also the current seat of the Municipality of Genoa. Its principal attraction is the Sala Paganini, dedicated to the celebrated Genoese composer Niccolò Paganini, where the famous violin known as the Cannone is kept, the instrument that Paganini played and cherished throughout his life, and which he bequeathed to his native city so that it might be preserved forever. The violin is traditionally played by the winner of the Paganini Prize, one of the most prestigious international violin competitions in the world, and on other important occasions. The rooms of the palace also house a rich selection from the historic collections of coins, weights, and official measures of the ancient Republic of Genoa."},
  {region:"Lombardia",name:"Arte rupestre della Val Camonica",city:"Capo di Ponte",
  it:"Ci troviamo a Capo di Ponte, in provincia di Brescia, nel cuore della Valcamonica nel Parco Naquane in Valcamonica Storia: Ci troviamo in uno dei luoghi più straordinari e misteriosi del mondo antico: una valle delle Alpi centrali che custodisce oltre migliaia di graffiti incisi nella roccia, realizzati nell'arco di oltre 13.000 anni di storia umana. Per molti di questi graffiti il significato è ancora oggi un mistero. Tutto ebbe inizio circa 12.000 anni fa, quando i ghiacciai dell'ultima era glaciale si ritirarono scivolando a valle e formando il lago d'Iseo. L'erosione prodotta dal ghiaccio levigò le rocce trasformandole in enormi lavagne di pietra, su cui le misteriose popolazioni che abitavano questa valle incisero pezzi della loro vita quotidiana. Questo popolo erano i Camuni, un popolo di antichissima origine presente in Valcamonica nell'età del ferro.Dalle fonti storiche sappiamo che furono assoggettati da Roma all'inizio del primo secolo dopo Cristo e gradualmente inseriti nelle strutture politiche e sociali dell'impero romano, dimenticando poco a poco la loro identità culturale, politica e religiosa. Parlavano una lingua oggi estinta, la lingua camuna, parlata nel primo millennio avanti Cristo in alcune valli delle Alpi centrali, tra cui la Valcamonica e la Valtellina. Era una lingua proto-indeuropea e ci è pervenuta proprio attraverso le iscrizioni incise su roccia, scritte in una variante dell'alfabeto etrusco settentrionale conosciuta come alfabeto camuno. Percorso: Il percorso che andremo a svolgere durerà circa un’ora ed è abbastanza semplice. la prima roccia che incontriamo è la Roccia n°50. Guardatela con attenzione: vedrete subito alcune incisioni rupestri che rappresentano per lo più cavalieri impegnati nella caccia e nei combattimenti. Su questa stessa roccia si trovano anche impronte di piede, iscrizioni in lingua camuna e figure con le braccia alzate in segno di preghiera o rituale. Proseguendo lungo il percorso arriviamo alla Roccia n°1, la prima scoperta e certamente quella che colpisce di più. Si tratta di un'enorme superficie levigata dai ghiacciai su cui prendono posto centinaia di raffigurazioni sovrapposte. Sono presenti numerose figure di animali, in particolare cervi, uomini armati, uccelli acquatici e un labirinto. Poco più avanti troviamo la Roccia n°35, che ospita due delle incisioni più famose del parco. La prima è il cosiddetto Sacerdote che corre, una figura umana stilizzata in corsa che è diventata uno dei simboli più riconoscibili dell'arte camuna. La seconda è la Scena del fabbro, che raffigura un villaggio con le sue attività quotidiane: si vedono edifici, uomini al lavoro e scene di vita comune, come una fotografia incisa nel passato. Continuando il percorso raggiungiamo la Roccia n°70, che secondo alcuni studiosi riporta la rappresentazione più antica della divinità celtica Cernunnos, il dio delle corna, una figura di grande importanza religiosa per i popoli dell'Europa antica. Infine non perdete la Roccia n°60, che ospita una figura molto importante: un cavallo  greco-etrusco, testimonianza dei contatti culturali tra i Camuni e le civiltà del Mediterraneo. Abbiamo terminato la nostra visita e abbiamo questo magnifico agriturismo, se volete, potete fermarvi a mangiare e assaporare i prodotti tipici della valle.",
  en:"--- **Intro** - We find ourselves in Capo di Ponte, in the province of Brescia, in the heart of the Valcamonica, within the Naquane Park. **History** - We are in one of the most extraordinary and mysterious places of the ancient world: an Alpine valley in the central Alps that preserves thousands of engravings carved into the rock, created over a span of more than 13,000 years of human history. For many of these carvings, the meaning remains a mystery to this day. It all began approximately 12,000 years ago, when the glaciers of the last Ice Age retreated, sliding down into the valley and forming Lake Iseo. The erosion produced by the ice smoothed the rocks, transforming them into enormous stone slabs, on which the mysterious peoples who inhabited this valley engraved scenes from their daily lives. These people were the Camuni, a people of very ancient origin, present in the Valcamonica during the Iron Age. From historical sources we know that they were subjugated by Rome at the beginning of the first century AD, and gradually absorbed into the political and social structures of the Roman Empire, slowly losing their cultural, political, and religious identity. They spoke a language now extinct, known as Camunian, which was used during the first millennium BC in several valleys of the central Alps, including the Valcamonica and the Valtellina. It was a proto-Indo-European language, and it has come down to us precisely through these rock inscriptions, written in a variant of the northern Etruscan alphabet known as the Camunian alphabet. **The Route** - The route we are about to follow will take approximately one hour, and is quite straightforward. The first rock we encounter is Rock number 50. Look at it carefully: you will immediately notice several rock engravings, depicting mostly horsemen engaged in hunting and combat. On this same rock, we also find footprints, inscriptions in the Camunian language, and figures with their arms raised in a gesture of prayer or ritual. Continuing along the path, we arrive at Rock number 1, the first to be discovered, and certainly the most striking of all. It is an enormous surface, smoothed by the glaciers, on which hundreds of overlapping figures have been carved. There are numerous animal figures, in particular deer, armed men, water birds, and a labyrinth. A little further on, we find Rock number 35, which hosts two of the most celebrated engravings in the park. The first is the so-called Running Priest, a stylised human figure caught in motion, which has become one of the most recognisable symbols of Camunian art. The second is the Blacksmith Scene, which depicts a village going about its daily activities: we can see buildings, men at work, and scenes of ordinary life, like a photograph engraved in stone from the distant past. Continuing along the route, we reach Rock number 70, which according to some scholars bears the oldest known representation of the Celtic deity Cernunnos, the Horned God, a figure of great religious importance for the peoples of ancient Europe. Finally, do not miss Rock number 60, which hosts a particularly significant figure: a Greco-Etruscan horse, a testimony to the cultural contacts between the Camuni and the civilisations of the Mediterranean world. We have now completed our visit, and just ahead is this wonderful agriturismo. If you wish, you are very welcome to stop for a meal and enjoy the traditional products of the valley."},
  {region:"Lombardia",name:"Grotte di Catullo",city:"Sirmione",
  it:"Benvenuti alle Grotte di Catullo, una meravigliosa villa romana sul Lago di Garda, a Sirmione. Stiamo per entrare, buon viaggio e buona visita! Appena entrati ci troviamo nel giardino delle Grotte di Catullo, con questi bellissimi ulivi secolari con una vista mozzafiato sul Lago di Garda che incornicia le antiche rovine romane. Quello che vedete davanti a voi è il criptoportico, che fungeva da fondamenta stabili per la parte superiore della villa, situata in una posizione dominante sul lago. Arriviamo ora alla piscina, simbolo di lusso e ingegneria avanzata, utilizzata per il relax e come spazio sociale. Alla destra del criptoportico troviamo una costruzione quadrangolare: il bagno, che in realtà era una delle cisterne che alimentavano l'impianto termale. Una precisazione importante sul nome del sito: il termine Grotte non si riferisce a cavità naturali, ma a queste imponenti rovine che, viste dal lago, sembrano grotte. Entriamo ora in ciò che rimane degli ambienti residenziali. Tra le stanze di soggiorno si distinguevano due ampi vani rettangolari e una vasta sala da pranzo. Arriviamo ora alla cisterna sotterranea sul lato sud del giardino porticato, che raccoglieva l'acqua piovana per le necessità quotidiane e manutentive della villa. Questo manufatto perfettamente conservato si presenta come un cortile rettangolare pavimentato in mattoncini di cotto disposti a spina di pesce. Il nome Grotte di Catullo deriva dalla leggenda che vuole la villa appartenuta al celebre poeta latino Catullo, che spesso menziona la bellezza del lago nei suoi scritti, anche se non ci sono prove dirette che la villa fosse di sua proprietà. Il sito si estende su una superficie di circa 2 ettari e le rovine includono non solo la residenza principale, ma anche un complesso termale, cisterne per l'acqua e le fondamenta di botteghe e altri edifici. Dal punto di vista culturale, le Grotte di Catullo offrono uno spaccato della vita quotidiana e del lusso dell'antica Roma, mostrando come elementi come le terme, i pavimenti a mosaico e i sofisticati sistemi di riscaldamento e raccolta dell'acqua fossero diffusi anche nelle residenze private di alto livello. Visitando queste Grotte di Catullo non vediamo solo la storia ma possiamo godere anche di panorami naturali mozzafiato sul Lago di Garda, rendendo questo sito un perfetto connubio tra cultura, storia e bellezza naturale. Questa combinazione rende le Grotte di Catullo uniche. La villa era strategicamente situata per sfruttare le vedute panoramiche del Lago di Garda, con una serie di terrazze che scendevano verso il lago. L'architettura del complesso evidenzia la maestria romana nell'integrare le costruzioni con il paesaggio circostante. Siamo ora nell'Aula dei Giganti, due grandiosi ambienti ubicati al piano inferiore dell'edificio che sostenevano il livello residenziale ormai crollato. Il nome Aula dei Giganti deriva dai grandi blocchi in pietra degli archi e dalle parti in tufo delle volte. Sono visibili anche sezioni di pavimenti in mattoncini che appartenevano alla grande terrazza Belvedere superiore. La villa non era solo un luogo di residenza, ma un vero e proprio centro per la vita sociale e culturale. Le terme, ad esempio, erano un punto di ritrovo per l'élite dove si conducevano affari e si discutevano politica e letteratura, oltre che luoghi di relax e benessere. Questa piccola area che vedete era un luogo sacro all'interno delle mura domestiche, dedicato ai geni protettori, dove il capofamiglia officiava i riti privati per il nucleo familiare. Possiamo ora ammirare i resti delle botteghe erano aree dedicate al commercio e all'artigianato, fornendo beni e servizi agli abitanti della villa. Siamo arrivati alla fine del percorso, troverete il museo, che vi consiglio di visitare. È vietato fare riprese professionali al suo interno. Prima di andare, fermiamoci un momento a goderci questo spettacolo: un caffè con una vista mozzafiato sul lago.",
  en:"--- **Welcome** - Welcome to the Grotte di Catullo, a magnificent Roman villa on the shores of Lake Garda, in Sirmione. We are about to enter. Enjoy the journey, and enjoy your visit. **The Garden** - As soon as we step inside, we find ourselves in the garden of the Grotte di Catullo, surrounded by these beautiful centuries-old olive trees, with a breathtaking view over Lake Garda framing the ancient Roman ruins. What you see before you is the cryptoporticus, which served as stable foundations for the upper part of the villa, set in a commanding position above the lake. **The Pool** - We now arrive at the pool, a symbol of luxury and advanced engineering, used for relaxation and as a social space. To the right of the cryptoporticus, we find a quadrangular structure: what appears to be a bathhouse, which was in fact one of the cisterns that supplied the thermal complex. **A note on the name** - An important clarification about the name of the site: the word Grotte,meaning caves, does not refer to natural cavities, but to these imposing ruins, which when seen from the lake appear to resemble caves. **The Residential Rooms** - We now enter what remains of the residential quarters. Among the living rooms, two large rectangular spaces and a spacious dining room can be distinguished. We arrive next at the underground cistern on the southern side of the porticoed garden, which collected rainwater for the daily needs and maintenance of the villa. This perfectly preserved structure presents itself as a rectangular courtyard, paved in small terracotta bricks laid in a herringbone pattern. **The Name** - The name Grotte di Catullo comes from the legend that the villa once belonged to the celebrated Latin poet Catullus, who frequently mentions the beauty of the lake in his writings, though there is no direct evidence that the villa was actually his property. The site extends across approximately two hectares, and the ruins include not only the main residence, but also a thermal complex, water cisterns, and the foundations of shops and other buildings. **Daily Life** - From a cultural perspective, the Grotte di Catullo offer a vivid window into the daily life and luxury of ancient Rome, showing how features such as baths, mosaic floors, and sophisticated systems for heating and water collection were common even in high-level private residences. Visiting the Grotte di Catullo, we encounter not only history, but also breathtaking natural views over Lake Garda, making this site a perfect union of culture, history, and natural beauty. It is precisely this combination that makes the Grotte di Catullo truly unique. **The Architecture** - The villa was strategically positioned to take full advantage of the panoramic views over Lake Garda, with a series of terraces descending towards the water. The architecture of the complex demonstrates the Roman mastery of integrating built structures with the surrounding landscape. **The Hall of the Giants** - We are now in the Aula dei Giganti, two grand spaces located on the lower floor of the building, which supported the residential level above, now collapsed. The name Hall of the Giants derives from the great stone blocks of the arches and the tufa sections of the vaults. Sections of brick flooring are also visible, which once belonged to the great upper Belvedere terrace. **Social Life** - The villa was not simply a place of residence, but a true centre for social and cultural life. The baths, for example, were a gathering point for the elite, where business was conducted and matters of politics and literature were discussed, in addition to their role as places of relaxation and wellbeing. **The Sacred Space** - This small area you see before you was a sacred space within the domestic walls, dedicated to the protective spirits of the household, where the head of the family performed private rites for the family group. **The Shops** - We can now admire the remains of the tabernae, the shops, which were areas dedicated to trade and craftsmanship, providing goods and services to the inhabitants of the villa. **Closing** - We have reached the end of the route. You will find the museum just ahead, and I encourage you to visit it. Please note that professional filming inside is not permitted. Before we part, let us take a moment to enjoy the view: a coffee, and a truly breathtaking panorama over the lake."},
