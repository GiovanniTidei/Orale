<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siti UNESCO Italia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5}
.header{position:fixed;top:0;left:0;right:0;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:20px;z-index:100}
.header-top{display:flex;gap:12px;margin-bottom:16px}
.lang-btn{flex:1;padding:10px;border:2px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-weight:600;transition:all .3s;color:#666;font-size:14px}
.lang-btn.active{background:#667eea;color:#fff;border-color:#667eea}
.site-display{background:#f9f9f9;padding:12px;border-radius:8px;margin-bottom:12px;font-size:15px;color:#333;font-weight:500;min-height:20px}
.site-display .number{color:#667eea;font-weight:700}
.controls{display:flex;gap:10px;margin-bottom:12px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .3s;font-size:14px}
.btn-play{background:#48bb78;color:#fff}
.btn-play:hover:not(:disabled){background:#38a169;transform:translateY(-2px)}
.btn-stop{background:#f56565;color:#fff}
.btn-stop:hover:not(:disabled){background:#e53e3e;transform:translateY(-2px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.progress-wrap{position:relative;width:100%;height:10px;background:#e0e0e0;border-radius:5px;cursor:pointer;user-select:none}
.progress-bar{height:100%;background:#667eea;border-radius:5px;width:0%;pointer-events:none}
.progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:#667eea;border-radius:50%;left:0%;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.list-container{margin-top:240px;padding:0 20px 20px}
.site-item{background:#fff;padding:16px;margin-bottom:10px;border-radius:8px;cursor:pointer;transition:all .3s;border-left:4px solid #ddd;box-shadow:0 2px 4px rgba(0,0,0,.05)}
.site-item:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateX(4px)}
.site-item.active{background:#667eea;color:#fff;border-left-color:#667eea}
.site-number{display:inline-block;background:rgba(102,126,234,.1);padding:2px 8px;border-radius:4px;font-weight:700;margin-right:8px;font-size:12px}
.site-item.active .site-number{background:rgba(255,255,255,.3)}
.site-region{font-size:13px;color:#999;margin-top:4px}
.site-item.active .site-region{color:rgba(255,255,255,.8)}
@media(max-width:480px){
  .header{padding:16px}
  .list-container{margin-top:220px;padding:0 16px 16px}
  .site-item{padding:12px}
  .btn{font-size:13px;padding:10px}
}
</style>
</head>

    <button class="lang-btn active" data-lang="it">🇮🇹 ITA</button>

</div>

  {region:"Calabria",name:"Museo Archeologico Nazionale di Reggio Calabria (Bronzi di Riace, Sezione Preistorica, Sezione Romana)",city:"Reggio Calabria",
  it:"Sezione Preistorica: Uno dei reperti più significativi di questa sezione è Il calco dell'incisione rupestre del Bos primigenius, della Grotta del Romito di Papasidero. L'originale è ancora oggi visibile in situ, all'interno del Parco Nazionale del Pollino. Il graffito raffigura bovide: il Bos primigenius, il grande uro selvatico, antenato dei bovini domestici, oggi estinto. L'artista preistorico sfruttò la conformazione naturale della roccia per dare alla figura un senso tridimensionale e una prospettiva. Questa incisione viene definita espressione del verismo paleolitico mediterraneo. Si può notare la precisione del segno e la resa anatomica dell'animale: la testa abbassata, il collo possente, la massa del corpo resa con poche linee essenziali ma di grande forza espressiva. Al piano terreno si trova la Sala dei Bronzi di Riace e di Porticello. L'accesso è contingentato per ragioni conservative, con temperatura e umidità mantenute costanti per preservare i metalli. I Bronzi di Riace sono due statue, stile classico, originali in bronzo, raffiguranti guerrieri nudi, atletici e barbati, in posizione eretta. Hanno proporzioni appena superiori al naturale (198 cm) Furono recuperate dai fondali del Mar Ionio da un sub dilettante. Originarie greche Furono imbarcate. L’identità è un enigma: potrebbero essere, atleti, divinità o personaggi storici. Realizzate con la tecnica della fusione a cera persa, le statue hanno dettagli anatomici definiti. La muscolatura è scolpita con plastica espressività. Le vene sono definite con precisione quasi medica. I materiali impiegati per i particolari sono preziosi e diversificati: le ciglia, le labbra e i capezzoli sono in rame; i denti in argento; l'iride in pasta vitrea colorata. La Testa del Filosofo di Porticello: Nella sala è esposta la cosiddetta Testa del Filosofo, una scultura bronzea del periodo classico greco, proveniente dal relitto di Porticello. L'opera ritrae un uomo maturo, con una lunga barba e una ricca capigliatura. Il frammento di ginocchio destro e un lembo di mantello corto rivelano che si trattava di una statua intera, raffigurante il personaggio in posizione eretta. L'appellativo Filosofo è convenzionale. L'identità del soggetto rimane incerta: forse era il poeta Esiodo, o Pitagora di Samo. La Testa di Basilea: Nella stessa sala è esposta anche la Testa di Basilea, proveniente dal relitto di Porticello e anch'essa parte del carico destinato alla fusione. Subito dopo la scoperta fu trafugata e immessa nel mercato antiquario illegale, giungendo all'Antikenmuseum di Basilea in Svizzera. Grazie alla Polizia italiana il reperto fu riconosciuto e restituito dal museo italiano. Sezione Romana — La sezione conserva Il mosaico con scena di caccia all'orso proveniente dalla cosiddetta Casa del mosaico di Taureana (odierna Palmi RC) Il mosaico è realizzato con la tecnica dell'opus vermiculatum: piccole tessere policrome disposte in modo da seguire i contorni delle figure con linee sinuose, come i movimenti di un verme. Questo metodo complesso consente di ottenere immagini di straordinaria finezza pittorica, paragonabili a veri dipinti. La scena raffigura due cacciatori a cavallo, armati di giavellotti, e uno a piedi circondano un orso, mentre tre cani lo attaccano. Sullo sfondo si distinguono un albero e la figura di un cinghiale. La composizione combina tensione drammatica e precisione descrittiva con notevole efficacia. Il mosaico occupava il centro geometrico di una sala da banchetto. Nella stessa sala fu rinvenuto un letto da banchetto in bronzo — la cosiddetta kline — decorato con applicazioni in argento e pietre preziose.",

  {region:"Campania",name:"Museo Archeologico Nazionale di Napoli — MANN (Collezione Farnese, Sezione Egizia, Sezione Magna Grecia, Sezione Pompeiana)",city:"Napoli",
  it:"Il Museo viene creato da Ferdinando IV di Borbone per riunire le collezioni reali in un unico polo: scelse il Palazzo degli Studi, dove il museo aprì al pubblico come Real Museo Borbonico. Collezione Farnese. Il Toro Farnese è la copia romana di un celebre gruppo scultoreo ellenistico in marmo. È la più grande scultura singola mai recuperata. Il toro farnese è stato rinvenuto nelle Terme di Caracalla. Il soggetto rappresenta il supplizio di Dirce, con i figli di Antiope (Anfione e Zeto) che, per  vendicare gli insulti alla madre, hanno legato a un toro selvaggio la matrigna Dirce. Lo stesso soggetto è raffigurato anche in un affresco della casa dei Vettii a Pompei. l'Ercole Farnese, proveniente dalle Terme di Caracalla. Opera dello scultore Glicone di Atene. Questa statua rappresenta Ercole, stanco al termine delle fatiche, che si riposa appoggiandosi alla clava, tenendo con la mano destra, dietro la schiena, i pomi d'oro rubati alle Esperidi. Colpisce l'aspetto malinconico di questo possente eroe, quasi a disagio nel momento in cui il suo corpo immenso non è impegnato in uno sforzo. Sezione Egizia: Naoforo Farnese: scultura in basalto di un personaggio (probabilmente un funzionario) inginocchiato con un piccolo tempietto (il naòs) tra le mani, al cui interno c’è il dio Osiride. La Dama di Napoli, si tratta di una rarissima statua arcaica che rappresenta un funzionario della terza dinastia seduto su uno sgabello, si pensava erroneamente che fosse una donna. Il corpo è grossolano mentre il volto è definito, il reperto è il  più antico della collezione egiziana. Il Monumento di Ameneminet, (soprintendente ai lavori nel tempio del faraone e capo dei Medjai, corpo di polizia del Nuovo Regno) è un blocco di diorite nera dalla forma trapezoidale, alto circa mezzo metro. Tutto intorno al blocco sono incise in bassorilievo ventidue figure avvolte come mummie, rigide e frontali, che rappresentano i familiari di Ameneminet: genitori, fratelli, sorelle, mogli e suoceri. Le figure sono identiche tra loro: con corpo stilizzato, ognuno ha un'iscrizione geroglifica incisa verticalmente sul suo corpo, con il nome e il legame di parentela con il defunto.  il monumento porta anche due invocazioni, alla base e sulla parte superiore. Sezione Magna Grecia: Il Vaso di Dario è un vaso a figure rosse su tre registri sovrapposti. La decorazione rappresenta una scena politica: il ritratto dell'impero persiano Dario nel momento del suo declino. In basso, un esattore delle tasse dall'aria contrariata; al centro, il re Dario in trono assiste impotente a una discussione dei consiglieri; in alto, le personificazioni allegoriche: l'Asia in trono come una regina sconfitta, e Ellas, la Grecia, umile ma vincitrice, vicina a Zeus. Alessandro Magno non appare, ma è lui il protagonista. la riflessione che ci mostra questo vaso, ancora attuale, è il problema dei  rapporti tra Oriente e Occidente. Gli affreschi della tomba delle Danzatrici sono una serie di sei lastre di tufo affrescate provenienti dalla tomba delle Danzatrici a Ruvo di Puglia. Il ciclo di affreschi rappresenta cinquantaquattro danzatrici in fila, viste di profilo, che si muovono tutte verso destra tenendosi per mano, accompagnate da suonatori. La scena rappresenta una danza rituale funebre o una processione, e avvolge le pareti della tomba come un lungo corteo. L'Hydria Vivenzio, è un vaso greco a figure rosse utilizzato per attingere e trasportare l'acqua, la decorazione rappresenta la caduta di Troia, in particolare le atrocità e la brutalità della guerra, con scene crude come il re Priamo trucidato mentre tiene in braccio il nipote e lo scempio di Cassandra aggredita da Aiace Sezione Pompeiana — Mosaici. La Battaglia di Isso è un mosaico in opus vermiculatum composto da oltre un milione di tessere finissime, rinvenuto nella Casa del Fauno di Pompei, misura oltre cinque metri di larghezza. La scena rappresenta lo scontro armato tra Alessandro Magno, a cavallo di Bucefalo, e Dario terzo di Persia in fuga sul carro. I Musici ambulanti in stile opus vermiculatum, realizzato da Dioscoride di Samo, è stato rinvenuto nella villa di Cicerone a Pompei. Raffigura una scena del secondo atto della Theophoroumene, una commedia di Menandro, in particolare: una processione di sacerdoti mendicanti: si tratta di un tema pittorico di origine greca Consultazione della fattucchiera:  in stile opus vermiculatum, realizzato da Dioscoride di Samo, è stato rinvenuto nella villa di Cicerone a Pompei. Il tema è quello della consultazione di una fattucchiera per la creazione di filtri d'amore.",
  en:""},
   {region:"Campania",name:" Museo di Capodimonte (Dipinti di Tiziano-Raffaello-Caravaggio, Appartamenti Reali, Collezione d'Arte Contemporanea)",city:"Napoli",
  it:"Il Museo venne creato da Carlo di Borbone con la collezione Farnese ereditata da Elisabetta Farnese; Tiziano, Ritratto di Paolo III con i nipoti. È un ritratto di corte del Rinascimento veneziano. Il papa è seduto al centro su fondo scuro con un drappo rosso; Ottavio si piega in un inchino a destra, Alessandro in abito cardinalizio sta in piedi a sinistra con le mani sulla sedia. La pittura è a pennellate larghe e libere, i volti costruiti con colori caldi su ombre brune, e il quadro è rimasto incompiuto: in alcune zone si vede la tela non coperta. Tiziano, Danae. È pittura mitologica nel colore veneziano. Una donna nuda è distesa su un letto, le gambe di profilo e il busto quasi frontale, con un piccolo Cupido accanto; dall'alto scende la pioggia d'oro di Giove. Sotto la pittura non c'è disegno preparatorio, la carne è fatta con tocchi sovrapposti di rosso e bianco, le ombre sono calde e graduali. Raffaello, Eterno Padre e Vergine. Sono due pezzi di una pala d'altare distrutta, nel primo stile umbro di Raffaello vicino al suo maestro Perugino. Si vede Dio Padre tra i cherubini e la testa della Vergine: i contorni sono netti e precisi, i colori puri, la luce uniforme senza forti contrasti tra chiaro e scuro. Raffaello, Ritratto di Alessandro Farnese. È un ritratto ecclesiastico dell'Alto Rinascimento romano. Un cardinale di mezza età occupa quasi tutta la superficie davanti a uno sfondo neutro; il volto è costruito con strati sottili di colore sovrapposti, lo sguardo è diretto e fermo. Raffaello, Madonna del Divino Amore. È una pala devozionale dell'Alto Rinascimento con struttura a triangolo, tecnica appresa da Leonardo. La Madonna col Bambino è seduta a sinistra, San Giovannino porta una piccola croce, Santa Elisabetta e San Giuseppe sono sullo sfondo dentro un'apertura scura. La luce è uniforme, i contorni morbidi, i colori bilanciati tra blu, rosso e ocra. Caravaggio, Flagellazione di Cristo. È pittura sacra nel naturalismo di Caravaggio. Cristo è legato a una colonna al centro, il corpo nudo colpito da una luce verticale dall'alto; tre carnefici restano nell'ombra, uno accovacciato sul pavimento a legare le fascine, uno che afferra i capelli di Cristo, uno appena visibile a destra. Le pennellate sono rapide, il contrasto tra luce e buio è netto e senza passaggi graduali. Salottino di Porcellana. È arte decorativa in stile Rococò. Le pareti sono coperte da lastre di porcellana bianca con fiori, figure cinesi in rilievo e sei specchi con cornici di fiori modellati; un lampadario a dodici bracci e colonne verticali di porcellana scandiscono lo spazio. Le scene seguono il gusto europeo del Settecento per l'Oriente immaginato, non quello reale. Camera da letto di Francesco I. È un interno in stile Neoclassico. Le pareti sono dipinte a tempera copiando il tipo di figure e ornamenti trovati negli scavi di Pompei ed Ercolano: fasce orizzontali, colori chiari e tenui, figure allungate su fondo chiaro. La tappezzeria è in seta di San Leucio, il pavimento in mosaici antichi. Andy Warhol, Vesuvius. È un dipinto acrilico su tela in stile Pop Art. Il vulcano in eruzione è dipinto con colori forti e non naturali, il profilo semplice e riconoscibile come un simbolo; fa parte di una serie di diciotto versioni dello stesso soggetto con colori diversi. Warhol usa il Vesuvio come aveva usato Marilyn o la lattina di Campbell's Soup: un'immagine ripetuta per aumentarne la forza visiva. Alberto Burri, Grande Cretto Nero. È un'opera di arte informale in ceramica. Una grande superficie di maiolica nera è attraversata da una rete di crepe bianche, ottenute controllando l'asciugatura dell'impasto durante la cottura. Non ci sono figure né storie: la materia è il soggetto, e le crepe sono il linguaggio.",
  en:""},
   {region:"Emilia-Romagna",name:"Museo Nazionale di Ravenna (Mosaici, Oggetti Paleocristiani, Codici Miniati)",city:"Ravenna",
  it:"La Sede del ex monastero benedettino di San Vitale. Mosaici: Le Sinopie sono i mosaici preparatori per il mosaico absidale di Sant'Apollinare in Classe. Si tratta di un disegno preparatorio tracciato in terra rossa direttamente sui mattoni, prima che sopra venisse steso l'intonaco per il mosaico; quando il mosaico è stato staccato, il disegno è apparso sotto, ed è stato trasferito su una struttura curva in alluminio che riproduce la forma originale dell'abside. Il disegno mostra coppie di pavoni uno di fronte all'altro, separate da cesti di fiori e rami intrecciati che formano il simbolo dell'albero della vita. Questo motivo decorativo non è mai diventato mosaico perché al suo posto fu realizzata la scena di Sant'Apollinare orante in mezzo al gregge, quella che si vede oggi nella basilica. L’aspetto interessante è la traccia di un'idea abbandonata. La Testa d'angelo è un frammento musivo parietale dalla volta del presbiterio di San Vitale. Si tratta di un pezzo staccato dalla parete della basilica. Le tessere bianche del viso si mescolano a quelle in terracotta rossastra per definire la pelle e i volumi; i capelli, i lineamenti, gli occhi e le ombre del naso sono tutti tracciati con tessere scure. Il capo ha un'aureola e spicca su un fondo verde uniforme; accanto al volto si riconoscono due frammenti di ali. Oggetti paleocristiani: il Dittico di Murano: è una preziosa copertina per Vangeli in avorio del VI secolo, composta da cinque pannelli, nei pannelli centrali viene raffigurato Cristo in trono circondato dagli apostoli. Le formelle laterali mostrano in miniatura vari miracoli e scene dell'Antico Testamento  (guarigione del cieco, resurrezione di Lazzaro, liberazione dell'indemoniato, guarigione dello storpio). Nella cornice superiore ci sono due figure di angeli che reggono una corona d’alloro. Nella formella inferiore viene rappresentato il ciclo di Giona. Sarcofago della Traditio Legis. È un'opera paleocristiana in marmo bianco importato da Costantinopoli, con il fronte scolpito a bassorilievo: al centro Cristo consegna il rotolo della Legge a Pietro, mentre gli altri apostoli assistono ai lati disposti in fila simmetrica sotto arcate che inquadrano ogni figura. Il soggetto, la Traditio Legis, è la consegna della Legge, tema diffuso nei primi secoli come immagine del potere spirituale trasmesso da Cristo alla Chiesa. Frammento di sarcofago con l'Incredulità di san Tommaso. È un pezzo paleocristiano in marmo, prodotto a Costantinopoli, che mostra Cristo che solleva il braccio sinistro mentre Tommaso allunga la mano verso la ferita del costato; le due figure sono inquadrate da due cipressi che danno alla scena un respiro quasi monumentale.",

// ─── State ────────────────────────────────────────────────────────────────────
let lang = 'it';
let selectedIdx = -1;
let isPlaying = false;
let utterance = null;
 
// Time-based tracking (works on mobile where onboundary is absent)
let playStartTime = 0;       // Date.now() when current segment started
let playOffset = 0;          // absolute char index where current segment started
let pauseCharIdx = 0;        // absolute char index saved at pause — used for resume
let animFrame = null;        // rAF handle
let chunks = [];
let currentChunkIdx = 0;

// ─── Background: mantiene audio attivo a schermo bloccato ─────────────────────
let _bgAudio = null;
let _resumeTimer = null;

// Tono a 1Hz (inudibile: sotto soglia umana) — NON silenzio puro
// Chrome conta solo audio con dati non-zero come "media attivo"
const _toneURL = (() => {
  const sr = 44100, n = sr;
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0, 'RIFF'); v.setUint32(4, 36 + n * 2, true); w(8, 'WAVE');
  w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
  w(36, 'data'); v.setUint32(40, n * 2, true);
  // Onda sinusoidale a 1Hz (ampiezza 100 per non essere completamente muta)
  for (let i = 0; i < n; i++) {
    const val = Math.sin(2 * Math.PI * i / sr) * 100;
    v.setInt16(44 + i * 2, Math.max(-32768, Math.min(32767, val)), true);
  }
  return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
})();

function startBgKeep() {
  if (_bgAudio) return;
  _bgAudio = new Audio(_toneURL);
  _bgAudio.loop = true;
  _bgAudio.volume = 0.001; // quasi muto ma non zero
  _bgAudio.play().catch(() => {});
  // 2) polling → riprende speechSynthesis se Chrome l'ha messa in pausa
  if (!_resumeTimer) {
    _resumeTimer = setInterval(() => {
      if (isPlaying && speechSynthesis.paused) speechSynthesis.resume();
    }, 500);
  }
}

function stopBgKeep() {
  if (_bgAudio) { _bgAudio.pause(); _bgAudio = null; }
  if (_resumeTimer) { clearInterval(_resumeTimer); _resumeTimer = null; }
}
 
// ─── Chars-per-second estimate ────────────────────────────────────────────────
// Default speech is ~150 wpm. Italian avg word ~5.5 chars + 1 space = ~6.5 chars.
// 150 wpm × 6.5 / 60 s ≈ 16 chars/s at rate 1.0
// We scale by the utterance rate.
function getCharsPerSecond() {
  const rate = (lang === 'it') ? 1.0 : 0.9;
  return 16 * rate;
}
 
// ─── DOM ──────────────────────────────────────────────────────────────────────
const playBtn      = document.getElementById('playBtn');
const stopBtn      = document.getElementById('stopBtn');
const siteDisplay  = document.getElementById('siteDisplay');
const listContainer= document.getElementById('listContainer');
const progressBar  = document.getElementById('progressBar');
const progressThumb= document.getElementById('progressThumb');
const progressWrap = document.getElementById('progressWrap');
 
// ─── Build list ───────────────────────────────────────────────────────────────
sites.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'site-item';
  el.dataset.index = i;
  el.innerHTML = `<span class="site-number">${i+1}</span><strong>${s.name}</strong><div class="site-region">${i+1}. ${s.region} • ${s.city}</div>`;
  el.addEventListener('click', () => selectSite(i));
  listContainer.appendChild(el);
});
 
// ─── Language buttons ─────────────────────────────────────────────────────────
document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  lang = btn.dataset.lang;
  stopAndReset();
}));
 
// ─── Helpers ──────────────────────────────────────────────────────────────────
function getText() {
  if (selectedIdx < 0) return '';
  return lang === 'it' ? sites[selectedIdx].it : sites[selectedIdx].en;
}
 
function setProgress(pct) {
  pct = Math.max(0, Math.min(100, pct));
  progressBar.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
}
 
// Snap charIdx back to the start of the current word (avoid mid-word start)
function snapToWord(text, charIdx) {
  if (charIdx <= 0) return 0;
  let i = charIdx;
  while (i > 0 && !/\s/.test(text[i - 1])) i--;
  return i;
}
 
// ─── rAF-based progress animation ─────────────────────────────────────────────
function startAnimation() {
  stopAnimation();
  function tick() {
    if (!isPlaying) return;
    const fullText = getText();
    if (!fullText) return;
    const elapsed = (Date.now() - playStartTime) / 1000;
    const estimatedAbs = playOffset + elapsed * getCharsPerSecond();
    const clampedAbs = Math.min(estimatedAbs, fullText.length);
    pauseCharIdx = Math.floor(clampedAbs);          // keep updated every frame
    setProgress((clampedAbs / fullText.length) * 100);
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}
 
function stopAnimation() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}
 
// ─── Cancel speech + animation ────────────────────────────────────────────────
function cancelSpeech() {
  speechSynthesis.cancel();
  stopAnimation();
  stopBgKeep();
  isPlaying = false;
  playBtn.disabled = false;
  chunks = [];
}
 
function stopAndReset() {
  cancelSpeech();
  playOffset   = 0;
  pauseCharIdx = 0;
  setProgress(0);
}
 
// ─── Select site ──────────────────────────────────────────────────────────────
function selectSite(idx) {
  if (idx !== selectedIdx) stopAndReset();
  selectedIdx = idx;
  document.querySelectorAll('.site-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-index="${idx}"]`).classList.add('active');
  siteDisplay.innerHTML = `<span class="number">${idx+1}.</span> ${sites[idx].name}`;
}
 
// Divide il testo in pezzi da max ~2500 caratteri, tagliando sui punti/punto e virgola
function splitIntoChunks(text, maxLen) {
  const result = [];
  let start = 0;
  while (start < text.length) {
    let end = Math.min(start + maxLen, text.length);
    if (end < text.length) {
      // cerca l'ultimo punto/newline prima di end
      let cut = -1;
      for (let i = end; i > start + maxLen * 0.5; i--) {
        if ('.!?\n'.includes(text[i])) { cut = i + 1; break; }
      }
      if (cut > start) end = cut;
    }
    result.push({ start, end, text: text.slice(start, end) });
    start = end;
  }
  return result;
}

// ─── Core: speak from absolute char index ─────────────────────────────────────
function speakFrom(charIdx) {
  cancelSpeech();
  startBgKeep();
  const fullText = getText();
  if (!fullText) return;

  const snapped = snapToWord(fullText, charIdx);
  pauseCharIdx = snapped;

  // Costruisci i chunk dall'inizio
  const allChunks = splitIntoChunks(fullText, 2500);

  // Trova il chunk da cui partire (quello che contiene snapped)
  let startChunk = 0;
  for (let i = 0; i < allChunks.length; i++) {
    if (allChunks[i].end > snapped) { startChunk = i; break; }
  }

  chunks = allChunks;
  currentChunkIdx = startChunk;

  // Il primo chunk potrebbe dover partire a metà
  const firstChunkStart = snapped - allChunks[startChunk].start;
  playOffset = snapped;
  playStartTime = Date.now();

  function speakChunk(chunkIdx, offsetInChunk) {
    if (chunkIdx >= chunks.length) {
      // Fine testo
      stopAnimation();
      stopBgKeep();
      isPlaying = false;
      playBtn.disabled = false;
      setProgress(100);
      playOffset   = 0;
      pauseCharIdx = 0;
      return;
    }

    const chunk = chunks[chunkIdx];
    const textToSpeak = chunk.text.substring(offsetInChunk || 0);

    utterance = new SpeechSynthesisUtterance(textToSpeak);
    utterance.lang = (lang === 'it') ? 'it-IT' : 'en-US';
    utterance.rate = (lang === 'it') ? 1.0 : 0.9;

    utterance.onboundary = (e) => {
      if (e.name !== 'word') return;
      playStartTime = Date.now() - (e.charIndex / getCharsPerSecond()) * 1000;
    };

    utterance.onstart = () => {
      isPlaying = true;
      playBtn.disabled = true;
      playStartTime = Date.now();
      // playOffset è già impostato correttamente prima di chiamare speakChunk
      startAnimation();
    };

    utterance.onend = () => {
      stopAnimation();
      if (!isPlaying) return; // pausa/stop manuale
      currentChunkIdx = chunkIdx + 1;
      playOffset = chunks[chunkIdx].end;
      pauseCharIdx = playOffset;
      playStartTime = Date.now();
      speakChunk(currentChunkIdx, 0);
    };


    utterance.onerror = (e) => {
      if (e.error === 'interrupted') return;
      stopAnimation();
      isPlaying = false;
      playBtn.disabled = false;
    };

    speechSynthesis.speak(utterance);
  }

  isPlaying = true;
  playBtn.disabled = true;
  speakChunk(startChunk, firstChunkStart > 0 ? firstChunkStart : 0);
}
 
// ─── Play button ──────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (selectedIdx < 0 || isPlaying) return;
  // Resume from where we paused (pauseCharIdx updated every rAF frame while playing)
  speakFrom(pauseCharIdx);
});
 
// ─── Pause button ─────────────────────────────────────────────────────────────
stopBtn.addEventListener('click', () => {
  if (!isPlaying) return;
  // pauseCharIdx is already up-to-date from the last rAF tick
  const savedChar = pauseCharIdx;
  const savedPct  = parseFloat(progressBar.style.width) || 0;
  cancelSpeech();
  pauseCharIdx = savedChar;   // restore after cancelSpeech (which doesn't touch it)
  setProgress(savedPct);
});
 
// ─── Progress bar: seek by click or drag ──────────────────────────────────────
function seekTo(e) {
  if (selectedIdx < 0) return;
  const rect = progressWrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const fullText = getText();
  if (!fullText) return;
  pauseCharIdx = Math.floor(pct * fullText.length);
  setProgress(pct * 100);
  speakFrom(pauseCharIdx);
}
 
let dragging = false;
progressWrap.addEventListener('mousedown',  e => { dragging = true; seekTo(e); });
document.addEventListener('mousemove',      e => { if (dragging) seekTo(e); });
document.addEventListener('mouseup',        ()=> { dragging = false; });
progressWrap.addEventListener('touchstart', e => { dragging = true; seekTo(e); }, {passive:true});
document.addEventListener('touchmove',      e => { if (dragging) seekTo(e); }, {passive:true});
document.addEventListener('touchend',       ()=> { dragging = false; });
</script>
</body>
</html>
